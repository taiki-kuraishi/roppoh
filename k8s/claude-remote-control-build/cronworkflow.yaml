apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: remote-dev-build
  namespace: argo
  labels:
    app.kubernetes.io/name: remote-dev-build
    app.kubernetes.io/managed-by: argocd
spec:
  # main を定期ポーリングしてビルド。外部到達不要の pull 型。
  # Argo Workflows v3.7+ は schedules(複数形・リスト)必須。
  schedules:
    - "*/10 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: argo-workflow
    entrypoint: main
    # ビルド成否を GitHub commit status へ通知（best-effort）
    onExit: notify-final
    activeDeadlineSeconds: 1800
    ttlStrategy:
      secondsAfterCompletion: 3600
    podGC:
      strategy: OnWorkflowSuccess
    arguments:
      parameters:
        - name: repo
          value: https://github.com/taiki-kuraishi/roppoh.git
        - name: image
          value: remote-dev
        # クラスタ内 push 先（Service DNS）。pull は registries.yaml ミラー経由。
        - name: zot
          value: zot.zot.svc.cluster.local:5000
        # commit status の context
        - name: status_context
          value: argo-workflows/remote-dev-build
    volumes:
      - name: docker-config
        secret:
          secretName: zot-push-dockerconfig
      - name: github-app
        secret:
          secretName: build-github-app
      # build の init(clone)→ main(kaniko)で共有するソースツリー
      - name: workspace
        emptyDir: {}
    templates:
      # -------------------------------------------------------------------
      # main: resolve → (notify pending) → (build) → (bump)
      # -------------------------------------------------------------------
      - name: main
        steps:
          - - name: resolve
              template: resolve
          - - name: notify-pending
              template: notify
              when: '"{{steps.resolve.outputs.parameters.needs_build}}" == "true"'
              continueOn:
                failed: true
              arguments:
                parameters:
                  - name: sha
                    value: "{{steps.resolve.outputs.parameters.full_sha}}"
                  - name: state
                    value: pending
                  - name: description
                    value: building image
          - - name: build
              template: build
              when: '"{{steps.resolve.outputs.parameters.needs_build}}" == "true"'
              arguments:
                parameters:
                  - name: image_sha
                    value: "{{steps.resolve.outputs.parameters.image_sha}}"
          - - name: bump
              template: bump
              when: '"{{steps.resolve.outputs.parameters.needs_bump}}" == "true"'
              arguments:
                parameters:
                  - name: image_sha
                    value: "{{steps.resolve.outputs.parameters.image_sha}}"

      # -------------------------------------------------------------------
      # resolve: GitHub App トークンで clone（private repo）し、コードパスの
      # 短縮/フル SHA を算出、zot にタグ有無 / manifest 差分を判定
      # -------------------------------------------------------------------
      - name: resolve
        outputs:
          parameters:
            - name: image_sha
              valueFrom:
                path: /tmp/out/image_sha
            # commit status 用フル SHA（onExit からも参照するため global 化）
            - name: full_sha
              globalName: full_sha
              valueFrom:
                path: /tmp/out/full_sha
            - name: needs_build
              globalName: needs_build
              valueFrom:
                path: /tmp/out/needs_build
            - name: needs_bump
              valueFrom:
                path: /tmp/out/needs_bump
        script:
          image: alpine:3.24
          command: [sh]
          env:
            - name: REPO
              value: "{{workflow.parameters.repo}}"
            - name: IMAGE
              value: "{{workflow.parameters.image}}"
            - name: ZOT
              value: "{{workflow.parameters.zot}}"
          source: |
            set -eu
            apk add --no-cache git curl openssl jq coreutils >/dev/null
            mkdir -p /tmp/out
            # --- GitHub App installation token（private repo の clone 用）---
            APP_ID=$(cat /github/app-id)
            INSTALLATION_ID=$(cat /github/installation-id)
            b64() { openssl base64 -e -A | tr '+/' '-_' | tr -d '='; }
            now=$(date +%s)
            header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64)
            payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' $((now - 60)) $((now + 540)) "$APP_ID" | b64)
            sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign /github/private-key.pem | b64)
            jwt="${header}.${payload}.${sig}"
            TOKEN=$(curl -s -X POST \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" | jq -r .token)
            [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "failed to obtain installation token"; exit 1; }
            AUTHED=$(printf '%s' "$REPO" | sed "s#https://#https://x-access-token:${TOKEN}@#")
            # blob を取得しない部分クローン（履歴は全取得 → log -- paths を確実に解決）
            git clone --filter=blob:none "$AUTHED" /src
            cd /src
            PATHS=".docker/remote-dev"
            IMAGE_SHA=$(git log -1 --format=%h -- $PATHS)
            FULL_SHA=$(git log -1 --format=%H -- $PATHS)
            CUR_TAG=$(grep -E "^[[:space:]]*image:.*${IMAGE}:" k8s/remote-dev/statefulset.yaml \
              | sed -E "s/.*${IMAGE}:([^[:space:]\"]+).*/\1/" | head -1)
            ACCEPT='application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json,application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json'
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "Accept: ${ACCEPT}" \
              "http://${ZOT}/v2/${IMAGE}/manifests/${IMAGE_SHA}")
            if [ "$CODE" = "200" ]; then NEEDS_BUILD=false; else NEEDS_BUILD=true; fi
            if [ "$CUR_TAG" = "$IMAGE_SHA" ]; then NEEDS_BUMP=false; else NEEDS_BUMP=true; fi
            printf '%s' "$IMAGE_SHA"   > /tmp/out/image_sha
            printf '%s' "$FULL_SHA"    > /tmp/out/full_sha
            printf '%s' "$NEEDS_BUILD" > /tmp/out/needs_build
            printf '%s' "$NEEDS_BUMP"  > /tmp/out/needs_bump
            echo "image_sha=${IMAGE_SHA} full_sha=${FULL_SHA} needs_build=${NEEDS_BUILD} needs_bump=${NEEDS_BUMP} (cur=${CUR_TAG})"
          volumeMounts:
            - name: github-app
              mountPath: /github
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

      # -------------------------------------------------------------------
      # build: init(clone, token 認証)→ main(kaniko, dir context)
      #   kaniko 自身は git 認証不要（事前 clone 済みの /workspace を使う）
      # -------------------------------------------------------------------
      - name: build
        inputs:
          parameters:
            - name: image_sha
        initContainers:
          - name: clone
            image: alpine:3.24
            command: [sh, -c]
            env:
              - name: REPO
                value: "{{workflow.parameters.repo}}"
            args:
              - |
                set -eu
                apk add --no-cache git openssl jq curl coreutils >/dev/null
                APP_ID=$(cat /github/app-id)
                INSTALLATION_ID=$(cat /github/installation-id)
                b64() { openssl base64 -e -A | tr '+/' '-_' | tr -d '='; }
                now=$(date +%s)
                header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64)
                payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' $((now - 60)) $((now + 540)) "$APP_ID" | b64)
                sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign /github/private-key.pem | b64)
                jwt="${header}.${payload}.${sig}"
                TOKEN=$(curl -s -X POST \
                  -H "Authorization: Bearer ${jwt}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" | jq -r .token)
                [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "failed to obtain installation token"; exit 1; }
                AUTHED=$(printf '%s' "$REPO" | sed "s#https://#https://x-access-token:${TOKEN}@#")
                git clone --depth 1 --branch main "$AUTHED" /workspace
            volumeMounts:
              - name: workspace
                mountPath: /workspace
              - name: github-app
                mountPath: /github
                readOnly: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi
        container:
          image: gcr.io/kaniko-project/executor:v1.24.0
          command: ["/kaniko/executor"]
          args:
            - --context=dir:///workspace
            - --dockerfile=.docker/remote-dev/Dockerfile
            - --destination={{workflow.parameters.zot}}/{{workflow.parameters.image}}:{{inputs.parameters.image_sha}}
            # zot のみ HTTP/insecure 扱い（base image は HTTPS のまま）
            - --insecure-registry={{workflow.parameters.zot}}
            - --skip-tls-verify-registry={{workflow.parameters.zot}}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            # zot push 用の ci 認証 config.json
            - name: docker-config
              mountPath: /kaniko/.docker
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

      # -------------------------------------------------------------------
      # bump: statefulset.yaml のタグを main へ commit-back（差分時のみ）
      # -------------------------------------------------------------------
      - name: bump
        inputs:
          parameters:
            - name: image_sha
        script:
          image: alpine:3.24
          command: [sh]
          env:
            - name: IMAGE_SHA
              value: "{{inputs.parameters.image_sha}}"
            - name: IMAGE
              value: "{{workflow.parameters.image}}"
          source: |
            set -eu
            apk add --no-cache git curl openssl jq coreutils >/dev/null
            APP_ID=$(cat /github/app-id)
            INSTALLATION_ID=$(cat /github/installation-id)
            b64() { openssl base64 -e -A | tr '+/' '-_' | tr -d '='; }
            now=$(date +%s)
            header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64)
            payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' $((now - 60)) $((now + 540)) "$APP_ID" | b64)
            sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign /github/private-key.pem | b64)
            jwt="${header}.${payload}.${sig}"
            TOKEN=$(curl -s -X POST \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" | jq -r .token)
            [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "failed to obtain installation token"; exit 1; }
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/taiki-kuraishi/roppoh.git" /repo
            cd /repo
            sed -i -E "s#(image: registry.roppoh.local/${IMAGE}:)[^[:space:]]+#\1${IMAGE_SHA}#" \
              k8s/remote-dev/statefulset.yaml
            if git diff --quiet; then echo "manifest already up to date"; exit 0; fi
            git config user.name "argo-workflow-tsar[bot]"
            git config user.email "298113515+argo-workflow-tsar[bot]@users.noreply.github.com"
            git add k8s/remote-dev/statefulset.yaml
            git commit -m "⬆️ deploy(${IMAGE}): ${IMAGE_SHA} [skip ci]"
            git push origin HEAD:main
          volumeMounts:
            - name: github-app
              mountPath: /github
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

      # -------------------------------------------------------------------
      # notify: GitHub commit status を POST（再利用テンプレート, best-effort）
      # -------------------------------------------------------------------
      - name: notify
        inputs:
          parameters:
            - name: sha
            - name: state
            - name: description
        script:
          image: alpine:3.24
          command: [sh]
          env:
            - name: SHA
              value: "{{inputs.parameters.sha}}"
            - name: STATE
              value: "{{inputs.parameters.state}}"
            - name: DESCRIPTION
              value: "{{inputs.parameters.description}}"
            - name: CONTEXT
              value: "{{workflow.parameters.status_context}}"
          source: |
            set -eu
            [ -n "$SHA" ] || { echo "no sha; skip status"; exit 0; }
            apk add --no-cache curl openssl jq coreutils >/dev/null
            APP_ID=$(cat /github/app-id)
            INSTALLATION_ID=$(cat /github/installation-id)
            b64() { openssl base64 -e -A | tr '+/' '-_' | tr -d '='; }
            now=$(date +%s)
            header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64)
            payload=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' $((now - 60)) $((now + 540)) "$APP_ID" | b64)
            sig=$(printf '%s.%s' "$header" "$payload" | openssl dgst -sha256 -sign /github/private-key.pem | b64)
            jwt="${header}.${payload}.${sig}"
            TOKEN=$(curl -s -X POST \
              -H "Authorization: Bearer ${jwt}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" | jq -r .token)
            [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "no token; skip status"; exit 0; }
            BODY=$(jq -n --arg s "$STATE" --arg c "$CONTEXT" --arg d "$DESCRIPTION" \
              '{state:$s, context:$c, description:$d}')
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/taiki-kuraishi/roppoh/statuses/${SHA}" \
              -d "$BODY")
            echo "commit status ${STATE} -> ${SHA} (http ${HTTP})"
          volumeMounts:
            - name: github-app
              mountPath: /github
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

      # -------------------------------------------------------------------
      # notify-final: onExit から成否を commit status へ（ビルドした時のみ）
      # -------------------------------------------------------------------
      - name: notify-final
        steps:
          - - name: success
              template: notify
              when: '"{{workflow.status}}" == "Succeeded" && "{{workflow.outputs.parameters.needs_build}}" == "true"'
              continueOn:
                failed: true
              arguments:
                parameters:
                  - name: sha
                    value: "{{workflow.outputs.parameters.full_sha}}"
                  - name: state
                    value: success
                  - name: description
                    value: image built and pushed
            - name: failure
              template: notify
              when: '"{{workflow.status}}" != "Succeeded" && "{{workflow.outputs.parameters.needs_build}}" == "true"'
              continueOn:
                failed: true
              arguments:
                parameters:
                  - name: sha
                    value: "{{workflow.outputs.parameters.full_sha}}"
                  - name: state
                    value: failure
                  - name: description
                    value: build failed
