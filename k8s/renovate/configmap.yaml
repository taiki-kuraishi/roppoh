apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
    app.kubernetes.io/managed-by: argocd
data:
  # initContainer が実行する GitHub App トークン発行スクリプト。
  # Node.js 組み込みモジュール (crypto / https / fs) のみを使用し、
  # 外部 npm 依存なしで動作する。
  token-init.js: |
    #!/usr/bin/env node
    'use strict';

    const crypto = require('crypto');
    const https = require('https');
    const fs = require('fs');

    const APP_ID = process.env.APP_ID;
    const INSTALLATION_ID = process.env.INSTALLATION_ID;
    const PRIVATE_KEY = fs.readFileSync('/creds/private-key.pem', 'utf8');

    function toBase64Url(buffer) {
      return buffer.toString('base64')
        .replace(/=/g, '')
        .replace(/\+/g, '-')
        .replace(/\//g, '_');
    }

    function createJWT() {
      const now = Math.floor(Date.now() / 1000);
      const header = toBase64Url(
        Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' }))
      );
      const payload = toBase64Url(
        Buffer.from(JSON.stringify({
          iat: now - 60,  // クロックスキュー対策で 60 秒前に発行したことにする
          exp: now + 600, // 10 分後に失効
          iss: String(APP_ID),
        }))
      );

      const signingInput = `${header}.${payload}`;
      const sign = crypto.createSign('RSA-SHA256');
      sign.update(signingInput);
      const signature = toBase64Url(sign.sign(PRIVATE_KEY));

      return `${signingInput}.${signature}`;
    }

    function getInstallationToken(jwt) {
      return new Promise((resolve, reject) => {
        const options = {
          hostname: 'api.github.com',
          path: `/app/installations/${INSTALLATION_ID}/access_tokens`,
          method: 'POST',
          headers: {
            Authorization: `Bearer ${jwt}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'roppoh-renovate/1.0',
            'Content-Length': '0',
          },
        };

        const req = https.request(options, (res) => {
          let body = '';
          res.on('data', (chunk) => { body += chunk; });
          res.on('end', () => {
            if (res.statusCode !== 201) {
              reject(new Error(`GitHub API error: HTTP ${res.statusCode}\n${body}`));
              return;
            }
            const { token } = JSON.parse(body);
            if (!token) {
              reject(new Error(`No token in response: ${body}`));
              return;
            }
            resolve(token);
          });
        });

        req.on('error', reject);
        req.end();
      });
    }

    async function main() {
      console.log('Generating GitHub App JWT...');
      const jwt = createJWT();

      console.log(`Requesting installation token for installation ${INSTALLATION_ID}...`);
      const token = await getInstallationToken(jwt);

      fs.writeFileSync('/shared/token', token, { encoding: 'utf8', mode: 0o600 });
      console.log('Installation token written to /shared/token');
    }

    main().catch((err) => {
      console.error('Error:', err.message);
      process.exit(1);
    });

  # Renovate のホスト設定（bot 起動に必要な最小限）。
  # 依存ルール / グループ / スケジュール等は repo 側の renovate.json で管理する。
  #
  # 【セットアップ時の変更が必要な箇所】
  # - APP_USER_ID: GitHub App 作成後に以下で取得する
  #   curl https://api.github.com/users/roppoh-renovate%5Bbot%5D | jq .id
  # - dryRun: 動作確認後にこの行を削除する
  config.js: |
    'use strict';

    const fs = require('fs');

    module.exports = {
      // initContainer が /shared/token に書き込んだ GitHub App インストールトークンを読む
      token: fs.readFileSync('/shared/token', 'utf8').trim(),

      platform: 'github',
      repositories: ['tsar-org/roppoh'],

      // repo 側に renovate.json が存在するため onboarding PR は不要
      onboarding: false,

      // GitHub App として PR / commit を作成するときの git author。
      // APP_USER_ID を実際の数値に置き換えること。
      gitAuthor: 'renovate-tsar[bot] <297387044+renovate-tsar[bot]@users.noreply.github.com>',
    };
