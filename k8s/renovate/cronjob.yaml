apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Renovate はコンテナ内の各種一時ディレクトリへの書き込みが必要なため
    # readOnlyRootFilesystem を main コンテナで強制しない
    ignore-check.kube-linter.io/no-read-only-root-fs: "Renovate requires write access to its container filesystem"
spec:
  # 毎週月曜 03:00 UTC に実行（.github/workflows/renovate.yml の cron 設定を踏襲）
  schedule: "0 3 * * 1"
  # 前回のジョブが実行中であれば新しいジョブを起動しない
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          serviceAccountName: renovate
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: token
              # 【自己更新】このイメージタグは Renovate 自身が kubernetes manager で更新する
              image: renovate/renovate:39.263.0
              command: ["node", "/scripts/token-init.js"]
              env:
                - name: APP_ID
                  valueFrom:
                    secretKeyRef:
                      name: renovate-github-app
                      key: APP_ID
                - name: INSTALLATION_ID
                  valueFrom:
                    secretKeyRef:
                      name: renovate-github-app
                      key: INSTALLATION_ID
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: creds
                  mountPath: /creds
                  readOnly: true
                - name: shared
                  mountPath: /shared
          containers:
            - name: renovate
              image: renovate/renovate:39.263.0
              env:
                - name: RENOVATE_CONFIG_FILE
                  value: /scripts/config.js
                - name: LOG_LEVEL
                  value: info
                - name: NODE_OPTIONS
                  value: "--max-old-space-size=1800"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 2Gi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: shared
                  mountPath: /shared
                - name: work
                  mountPath: /tmp/renovate
          volumes:
            - name: scripts
              configMap:
                name: renovate-config
                defaultMode: 0555
            - name: creds
              secret:
                secretName: renovate-github-app
                items:
                  - key: private-key.pem
                    path: private-key.pem
                defaultMode: 0440
            - name: shared
              emptyDir: {}
            - name: work
              emptyDir: {}
