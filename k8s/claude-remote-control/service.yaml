apiVersion: v1
kind: Service
metadata:
  name: claude-remote-control
  namespace: claude-remote-control
  labels:
    app.kubernetes.io/name: claude-remote-control
    app.kubernetes.io/managed-by: argocd
spec:
  # cloudflared が CF ダッシュボード設定(コード管理外)から
  # ssh://claude-remote-control.claude-remote-control.svc.cluster.local:22 を引く。
  type: ClusterIP
  selector:
    app.kubernetes.io/name: claude-remote-control
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
