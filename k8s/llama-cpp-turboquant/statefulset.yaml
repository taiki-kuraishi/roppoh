apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: llama-cpp-turboquant
  namespace: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp-turboquant
    app.kubernetes.io/managed-by: argocd
spec:
  # TurboQuant試験用。GPU(RTX 3050 6GB)は1基のみで llama-cpp/ollama と排他のため、
  # k8s/llama-cpp/statefulset.yaml 側の replicas を同じコミットで 0 に落として有効化する
  # (k8s/ollama/statefulset.yaml と同じ運用。kubectl scale の一時操作は
  # selfHeal で巻き戻されるため使わない)。切り戻しは本値を 0 に戻すだけでよい。
  replicas: 1
  serviceName: llama-cpp-turboquant
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-cpp-turboquant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-cpp-turboquant
    spec:
      # GPU 搭載ノード(z390 / RTX 3050 6GB)にのみスケジュール
      nodeSelector:
        nvidia.com/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llama-cpp-turboquant
          # 【自己更新】k8s/llama-cpp-turboquant-build/cronworkflow.yaml の bump ジョブが
          # フォークビルドの git short SHA へ書き換える(Renovate 対象外の自前ビルド)。
          image: registry.roppoh.local/llama-cpp-turboquant:init
          # llama-swap をプロキシとして起動。実際の推論は config に定義したモデルの
          # llama-server(TurboQuantフォークビルド)子プロセスが on-demand で担う。
          command:
            - /app/llama-swap
          args:
            - -config
            - /app/config.yaml
            - --listen
            - :8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # llama-server(子プロセス)の -hf ダウンロード先。PVC 上に置き再 DL を防ぐ。
            - name: LLAMA_CACHE
              value: /data/models
            # 非 root 実行のため HOME を書き込み可能な emptyDir に向ける
            - name: HOME
              value: /home/llama
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # 試験用の単一モデル運用のため本番(llama-cpp)より小さめの初期値。
          # 実機ベンチ後、Grafana Mimir の実測値で調整する。
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              memory: 12Gi
              # GPU 1基を占有(RTX 3050 6GB)。llama-cpp/ollama とは排他(GPU は1基のみ)
              nvidia.com/gpu: 1
          # llama-swap プロキシ自体は即時起動する(モデルは on-demand ロード)。
          # プロキシが listen しているかを TCP で確認する。モデルのロード完了は
          # llama-swap の healthCheckTimeout(config.yaml)側が担保する。
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /data/models
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/llama
      volumes:
        - name: config
          configMap:
            name: llama-cpp-turboquant-config
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            # 試験対象モデル1つ(14.2GB)+ ダウンロード時の一時ファイル分の余裕。
            # 既存 llama-cpp の PVC は稼働中 Pod に排他マウントされ続けるため共有不可。
            storage: 20Gi
