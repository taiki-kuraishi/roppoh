apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale
  namespace: tailscale
  labels:
    app.kubernetes.io/name: tailscale
    app.kubernetes.io/managed-by: argocd
rules:
  # tailscale はノードの状態(WireGuard 鍵など)を TS_KUBE_SECRET(tailscale-state)に
  # 保存・更新する。ephemeral ノードでもポート/鍵の再利用のため読み書きが要る。
  # create は resourceNames で絞れないため secrets 全体に許可し、
  # 読み書きは state Secret のみに限定する。
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tailscale-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale
  namespace: tailscale
  labels:
    app.kubernetes.io/name: tailscale
    app.kubernetes.io/managed-by: argocd
subjects:
  - kind: ServiceAccount
    name: tailscale
    namespace: tailscale
roleRef:
  kind: Role
  name: tailscale
  apiGroup: rbac.authorization.k8s.io
