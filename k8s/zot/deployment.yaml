apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: zot
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/managed-by: argocd
spec:
  # ストレージは R2 のため複数レプリカも可だが、dedupe ローカルキャッシュ整合のため単一に。
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # emptyDir(/var/lib/zot, /tmp)を非 root で書けるように
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zot
          # 【自己更新】Renovate が追従
          image: ghcr.io/project-zot/zot-linux-amd64:v2.1.17
          args: ["serve", "/etc/zot/config.json"]
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            # R2(S3) 認証情報: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
            - secretRef:
                name: zot-object-storage
          # 認証有効時 /v2/ は匿名で 401 を返しうるため HTTP probe は使わず TCP で死活監視
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/zot
              readOnly: true
            - name: htpasswd
              mountPath: /secret
              readOnly: true
            - name: data
              mountPath: /var/lib/zot
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: zot-config
        - name: htpasswd
          secret:
            secretName: zot-htpasswd
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
