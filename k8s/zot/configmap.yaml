apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: zot
  labels:
    app.kubernetes.io/name: zot
    app.kubernetes.io/managed-by: argocd
data:
  # zot 設定（認証情報は含めない）。
  # S3 driver の認証は zot-object-storage Secret の AWS_ACCESS_KEY_ID /
  # AWS_SECRET_ACCESS_KEY 環境変数から AWS SDK が読み取る。
  config.json: |
    {
      "distSpecVersion": "1.1.1",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "dedupe": false,
        "storageDriver": {
          "name": "s3",
          "rootdirectory": "/zot",
          "region": "auto",
          "regionendpoint": "https://bd1a33a9922e50b3afff5a2f21ad52d0.r2.cloudflarestorage.com",
          "bucket": "roppoh-zot",
          "forcepathstyle": true,
          "secure": true
        }
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "auth": {
          "htpasswd": {
            "path": "/secret/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "anonymousPolicy": ["read"],
              "policies": [
                {
                  "users": ["ci"],
                  "actions": ["read", "create", "update"]
                }
              ]
            }
          }
        }
      },
      "log": {
        "level": "info"
      }
    }
