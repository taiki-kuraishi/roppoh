apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/managed-by: argocd
data:
  # クラスター内 ollama(k8s/ollama)を OpenAI 互換エンドポイントとして利用する。
  # このファイルのみ subPath で PVC 上の /opt/data/config.yaml に個別マウントし、
  # memories/skills/sessions/logs 等の他の永続データは上書きしない。
  config.yaml: |
    model:
      default: "qwen3.5:9b"
      provider: custom
      base_url: "http://ollama.ollama.svc.cluster.local:11434/v1"
