apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/managed-by: argocd
data:
  # クラスター内 llama-cpp(k8s/llama-cpp)を OpenAI 互換エンドポイントとして利用する。
  # llama.cpp の --cpu-moe により RTX 3050 6GB でも Qwen3.5-35B-A3B(MoE)を動かせる。
  # default は llama-server の --alias と一致させること。
  # このファイルのみ subPath で PVC 上の /opt/data/config.yaml に個別マウントし、
  # memories/skills/sessions/logs 等の他の永続データは上書きしない。
  config.yaml: |
    model:
      default: "qwen3.5-35b-a3b"
      provider: custom
      base_url: "http://llama-cpp.llama-cpp.svc.cluster.local:8080/v1"
