apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/managed-by: argocd
spec:
  # Gateway は単一プロセス + 永続 state(PVC) 前提のため必ず単一 Pod。
  # ローリング更新で新旧 Pod が同時に PVC を掴むのを避けるため Recreate を使う。
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
        # 公式イメージの既定ユーザー(node)
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # PVC 上の $XDG_CONFIG_HOME(.openclaw)を uid 1000 所有で先に作成する。
        # これをしないと後続の config subPath マウント時に kubelet が
        # .openclaw を root 所有・group 書き込み不可(fsGroup は書き込みビットを
        # 補正しない)で自動生成し、uid 1000 の openclaw が state ディレクトリを
        # 作れず EACCES で CrashLoopBackOff になる。
        - name: init-config-dir
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /home/node/.openclaw
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            # home(PVC)のみマウント。config subPath は意図的にマウントしない
            # (マウントすると initContainer 内でも同じ root 生成問題が起きるため)。
            - name: home
              mountPath: /home/node
      containers:
        - name: openclaw
          # 【自己更新】このタグは Renovate が更新する
          image: ghcr.io/openclaw/openclaw:2026.6.11
          command:
            - node
            - dist/index.js
            - gateway
            - --bind
            - lan
            - --port
            - "18789"
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: XDG_CONFIG_HOME
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            # mDNS(Bonjour) は Kubernetes 環境では動作しないため無効化必須
            - name: OPENCLAW_DISABLE_BONJOUR
              value: "1"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw
                  key: gateway-token
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            # HOME 全体を永続化(state/workspace/.openclaw)。readOnlyRootFilesystem のため必須。
            - name: home
              mountPath: /home/node
            # openclaw.json / AGENTS.md は ConfigMap 由来を読み取り専用でオーバーレイ
            - name: config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
            - name: config
              mountPath: /home/node/.openclaw/AGENTS.md
              subPath: AGENTS.md
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: openclaw
        - name: config
          configMap:
            name: openclaw-config
        - name: tmp
          emptyDir: {}
