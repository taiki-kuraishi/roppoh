apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/managed-by: argocd
data:
  # openclaw.json は意図的にここで管理しない。
  # OpenClaw は onboard/Control UI ダッシュボードでの対話的な設定変更を前提とした
  # アプリで、config を Git 管理の読み取り専用ファイルにすると
  # gateway.mode 未設定や ConfigMap subPath の権限問題など、この前提と衝突する
  # バグを繰り返し引き起こす。models/agents(Ollama バックエンド, qwen3.5:9b)や
  # gateway.mode は初回デプロイ後に Control UI ダッシュボードから設定すること。
  AGENTS.md: |
    # OpenClaw Agent Instructions

    このエージェントは roppoh クラスタ上でセルフホストされています。
    LLM バックエンドはクラスタ内 Ollama(qwen3.5:9b)です。
