apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-alloy
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-app-deployed.github: ""
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.10.0
    helm:
      valuesObject:
        # -----------------------------------------------------------------------
        # DaemonSet モード: 全ノードでログ収集 + ノード別メトリクス収集
        # -----------------------------------------------------------------------
        controller:
          type: daemonset

        alloy:
          # ホストの /var/log をマウント（Pod ログファイルのテール用）
          mounts:
            varlog: true
            dockercontainers: true # Docker ランタイムのシンボリックリンク追従用

          # OTLP ポートを Service に公開（Cloudflare Workers からのトレース受信用）
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP

          # ノード名を env として注入（DaemonSet でノード別にスクレイプ対象を絞るため）
          extraEnv:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # OTLP receiver の bearer 認証トークン（Cloudflare Workers からの送信を検証）
            - name: CF_WORKERS_OTLP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cf-workers-otlp-token
                  key: token

          # -----------------------------------------------------------------------
          # Alloy (River) 設定
          # -----------------------------------------------------------------------
          configMap:
            create: true
            content: |
              // =================================================================
              // LOG COLLECTION: Pod ログをホスト filesystem (/var/log/pods) からテール
              // =================================================================

              // クラスタ内の全 Pod を検出
              discovery.kubernetes "pods" {
                role = "pod"
              }

              // Pod → ログファイルパスのマッピングと Loki ラベル付与
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets

                // このノード上の Pod のみ対象（DaemonSet でのファイルテール漏れ防止）
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  action        = "keep"
                  regex         = env("KUBE_NODE_NAME")
                }

                // 終了済みコンテナはスキップ
                rule {
                  source_labels = ["__meta_kubernetes_pod_phase"]
                  regex         = "Pending|Succeeded|Failed|Completed"
                  action        = "drop"
                }

                // ログファイルパスを生成: /var/log/pods/*<uid>/<container>/*.log
                rule {
                  source_labels = [
                    "__meta_kubernetes_pod_uid",
                    "__meta_kubernetes_pod_container_name",
                  ]
                  separator    = "/"
                  regex        = "(.+)"
                  target_label = "__path__"
                  replacement  = "/var/log/pods/*$1/*.log"
                }

                // Loki ラベル
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
                  separator    = "/"
                  target_label = "job"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
              }

              // discovery.relabel.pod_logs.output の __path__ はグロブ (/var/log/pods/*<uid>/*/*.log) を
              // 含むが、loki.source.file はグロブを展開しない。local.file_match を介して実ファイルパスへ
              // 展開してから渡す (これが無いと Pod ログが一切 tail されない)。
              local.file_match "pod_logs" {
                path_targets = discovery.relabel.pod_logs.output
              }

              // ログファイルをテールして Loki gateway に送信
              loki.source.file "pod_logs" {
                targets    = local.file_match.pod_logs.targets
                forward_to = [loki.write.grafana.receiver]
              }

              loki.write "grafana" {
                endpoint {
                  url = "http://grafana-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
                }
              }

              // =================================================================
              // METRICS COLLECTION: kubelet + cAdvisor (API server proxy 経由)
              // 各 DaemonSet Pod は自身のノードのみスクレイプする
              // =================================================================

              // クラスタ内のノードを検出
              discovery.kubernetes "nodes" {
                role = "node"
              }

              // kubelet /metrics (自ノードのみ)
              discovery.relabel "kubelet" {
                targets = discovery.kubernetes.nodes.targets

                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  action        = "keep"
                  regex         = env("KUBE_NODE_NAME")
                }
                rule {
                  target_label = "__address__"
                  replacement  = "kubernetes.default.svc.cluster.local:443"
                }
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  regex         = "(.+)"
                  target_label  = "__metrics_path__"
                  replacement   = "/api/v1/nodes/$1/proxy/metrics"
                }
                rule {
                  target_label = "job"
                  replacement  = "kubelet"
                }
                // __address__ が apiserver proxy の同一アドレスに書き換わるため、明示的に
                // instance/node へノード名を書き込んでおかないと n100/z390 のシリーズが
                // 衝突する (instance が指定されていれば Prometheus はそれを優先する)。
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  target_label  = "instance"
                }
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  target_label  = "node"
                }
              }

              prometheus.scrape "kubelet" {
                targets           = discovery.relabel.kubelet.output
                scheme            = "https"
                scrape_interval   = "60s"
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                tls_config {
                  ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  insecure_skip_verify = true
                }
                forward_to = [prometheus.remote_write.mimir.receiver]
              }

              // cAdvisor /metrics/cadvisor (自ノードのみ)
              discovery.relabel "cadvisor" {
                targets = discovery.kubernetes.nodes.targets

                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  action        = "keep"
                  regex         = env("KUBE_NODE_NAME")
                }
                rule {
                  target_label = "__address__"
                  replacement  = "kubernetes.default.svc.cluster.local:443"
                }
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  regex         = "(.+)"
                  target_label  = "__metrics_path__"
                  replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
                }
                rule {
                  target_label = "job"
                  replacement  = "kubernetes-cadvisor"
                }
                // kubelet と同様、apiserver proxy 経由で __address__ が両ノードで
                // 同一になるため instance/node を明示的に付与する。
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  target_label  = "instance"
                }
                rule {
                  source_labels = ["__meta_kubernetes_node_name"]
                  target_label  = "node"
                }
              }

              prometheus.scrape "cadvisor" {
                targets           = discovery.relabel.cadvisor.output
                scheme            = "https"
                scrape_interval   = "60s"
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                tls_config {
                  ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  insecure_skip_verify = true
                }
                forward_to = [prometheus.remote_write.mimir.receiver]
              }

              prometheus.remote_write "mimir" {
                endpoint {
                  // 注意: /prometheus は Mimir gateway の読み取り専用クエリ API のプレフィックス。
                  // push (remote_write) の正しいパスは /api/v1/push (これを /prometheus 配下に
                  // していたため 404 で全メトリクスが起動以来 1 件も取り込まれていなかった)。
                  url = "http://grafana-mimir-gateway.monitoring.svc.cluster.local/api/v1/push"
                }
              }

              // =================================================================
              // OTLP RECEIVER: アプリ (discord-gateway-proxy 等) / Cloudflare Workers の
              // traces / logs / metrics を受信
              //   - bearer 認証で incoming Authorization: Bearer <token> を検証
              //   - traces → Tempo / logs → Loki / metrics → Mimir
              // =================================================================

              // incoming リクエストの Authorization: Bearer <token> を検証（server authenticator）
              otelcol.auth.bearer "cf_workers" {
                token = env("CF_WORKERS_OTLP_TOKEN")
              }

              otelcol.receiver.otlp "default" {
                grpc {
                  endpoint = "0.0.0.0:4317"
                  auth     = otelcol.auth.bearer.cf_workers.handler
                }
                http {
                  endpoint = "0.0.0.0:4318"
                  auth     = otelcol.auth.bearer.cf_workers.handler
                }
                output {
                  traces  = [otelcol.exporter.otlp.tempo.input]
                  // logs は transform で Loki ラベルヒントを付与してから exporter へ流す
                  logs    = [otelcol.processor.transform.cf_workers_loki_labels.input]
                  metrics = [otelcol.exporter.prometheus.mimir.input]
                }
              }

              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "grafana-tempo.monitoring.svc.cluster.local:4317"
                  tls {
                    insecure = true
                  }
                }
              }

              // OTLP logs に Loki ラベルヒントを付与する。
              // otelcol.exporter.loki は resource 属性 `loki.resource.labels` に
              // 列挙されたキーを Loki ストリームラベルへ昇格させる。service.name を
              // 指定するとラベル `service_name` が付き、ダッシュボードの
              // {service_name=~"$service"} で絞り込める(pod ログとの区別にもなる)。
              otelcol.processor.transform "cf_workers_loki_labels" {
                error_mode = "ignore"
                log_statements {
                  context = "resource"
                  statements = [
                    `set(resource.attributes["loki.resource.labels"], "service.name")`,
                  ]
                }
                output {
                  logs = [otelcol.exporter.loki.grafana.input]
                }
              }

              // OTLP logs → Loki 形式に変換し、既存の loki.write.grafana（loki-gateway push API）へ転送
              otelcol.exporter.loki "grafana" {
                forward_to = [loki.write.grafana.receiver]
              }

              // OTLP metrics を Prometheus 形式に変換し、既存の remote_write 経由で
              // Mimir へ送る。
              otelcol.exporter.prometheus "mimir" {
                forward_to = [prometheus.remote_write.mimir.receiver]
              }

        # -----------------------------------------------------------------------
        # RBAC: kubelet/cAdvisor スクレイプに必要なルールを追加
        # -----------------------------------------------------------------------
        rbac:
          clusterRules:
            # discovery.kubernetes (Nodes)
            - apiGroups: [""]
              resources: ["nodes"]
              verbs: ["get", "list", "watch"]
            # discovery.kubelet
            - apiGroups: [""]
              resources: ["nodes/pods"]
              verbs: ["get", "list", "watch"]
            # kubelet /metrics (直接アクセス)
            - apiGroups: [""]
              resources: ["nodes/metrics"]
              verbs: ["get", "list", "watch"]
            # API server proxy 経由の kubelet/cAdvisor アクセスに必要
            - apiGroups: [""]
              resources: ["nodes/proxy"]
              verbs: ["get"]
            # /metrics と /metrics/cadvisor の非リソース URL
            - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
              verbs: ["get"]

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
