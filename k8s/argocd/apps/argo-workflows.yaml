apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 1.0.19
    helm:
      valuesObject:
        # UI/API サーバを有効化し、Cloudflare Tunnel + Access(kuraishi-only)で公開する。
        # 攻撃面は Cloudflare Access(argo-workflow.tsar-bmb.org)が前段で塞ぐ。
        server:
          enabled: true
          # Cloudflare Access を前段の認証ゲートにするため、argo-server 自体の
          # SSO/ログインは行わない(--auth-mode=server 相当)。
          authModes:
            - server
          # cloudflared が HTTP で到達できるよう自己署名 TLS を無効化(平文 HTTP)。
          secure: false
        controller:
          # Workflow / CronWorkflow を実行する namespace
          workflowNamespaces:
            - argo
        # Workflow Pod 用の ServiceAccount(argo-workflow) と最小 RBAC を作成
        workflow:
          serviceAccount:
            create: true
            name: argo-workflow
          rbac:
            create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRD を含む大きな manifest があるため server-side apply を使う
      - ServerSideApply=true
