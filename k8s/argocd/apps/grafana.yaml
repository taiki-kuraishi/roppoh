apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-app-deployed.github: ""
spec:
  project: default
  source:
    # 2026-01-30 以降 Grafana Helm chart は grafana-community に移行済み
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: 12.7.2
    helm:
      valuesObject:
        # -----------------------------------------------------------------------
        # ストレージ無効化: Grafana DB は emptyDir (揮発)
        # ダッシュボード/データソースはコード provisioning で管理するため問題なし
        # -----------------------------------------------------------------------
        persistence:
          enabled: false

        # -----------------------------------------------------------------------
        # 管理者認証: 事前作成した Secret `grafana-admin` を参照
        # kubectl -n monitoring create secret generic grafana-admin \
        #   --from-literal=admin-user=admin \
        #   --from-literal=admin-password=<STRONG_PASSWORD>
        # -----------------------------------------------------------------------
        admin:
          existingSecret: grafana-admin
          userKey: admin-user
          passwordKey: admin-password

        # -----------------------------------------------------------------------
        # データソース provisioning (コード管理)
        # Service 名は各 ArgoCD Application 名 (= Helm release 名) から決まる
        # -----------------------------------------------------------------------
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                uid: loki
                # grafana-loki chart が作成する nginx gateway Service
                url: http://grafana-loki-gateway.monitoring.svc.cluster.local
                access: proxy
                isDefault: false

              - name: Mimir
                type: prometheus
                uid: mimir
                # grafana-mimir chart が作成する nginx gateway Service
                url: http://grafana-mimir-gateway.monitoring.svc.cluster.local/prometheus
                access: proxy
                isDefault: true
                jsonData:
                  # 各 exporter の scrape_interval (node-exporter/kubelet/cadvisor 等,
                  # grafana-alloy.yaml 参照) は 60s。未設定だと Grafana はデフォルト 15s と
                  # 仮定して $__rate_interval = max($__interval+scrape_interval, 4*scrape_interval)
                  # を計算するため、rate() に必要な最小ウィンドウ (4*60s=240s) を下回り
                  # rate()/irate()/increase() を使う全パネルが No Data になっていた。
                  timeInterval: "60s"

              - name: Tempo
                type: tempo
                uid: tempo
                # grafana-tempo Service (HTTP クエリ: ポート 3200)
                url: http://grafana-tempo.monitoring.svc.cluster.local:3200
                access: proxy
                isDefault: false
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                  tracesToMetrics:
                    datasourceUid: mimir
                  serviceMap:
                    datasourceUid: mimir

        # -----------------------------------------------------------------------
        # ダッシュボード provisioning (コード管理)
        # sidecar が monitoring namespace の `grafana_dashboard: "1"` ラベル付き
        # ConfigMap を監視して自動ロードする。ConfigMap は
        # k8s/monitoring/dashboards/ から kustomize (configMapGenerator) で生成し、
        # JSON 自体は packages/grafana-dashboards (Foundation SDK) が出力する。
        # -----------------------------------------------------------------------
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            # ConfigMap の `grafana_folder` アノテーションでフォルダ分けする
            folderAnnotation: grafana_folder
            provider:
              foldersFromFilesStructure: true

        # -----------------------------------------------------------------------
        # Service: ClusterIP のみ (外部公開は Cloudflare Tunnel で別途対応)
        # アクセス: kubectl -n monitoring port-forward svc/grafana 3000:80
        # -----------------------------------------------------------------------
        service:
          type: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
