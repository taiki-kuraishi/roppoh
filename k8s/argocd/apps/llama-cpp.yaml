apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llama-cpp
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-app-deployed.github: ""
spec:
  project: default
  source:
    repoURL: https://github.com/taiki-kuraishi/roppoh
    targetRevision: main
    path: k8s/llama-cpp
  destination:
    server: https://kubernetes.default.svc
    namespace: llama-cpp
  # NOTE: -nkvo(KVキャッシュのCPU RAM配置)によるcontext拡張検証中、config.yaml を
  # 直接 kubectl apply で差し替えるため一時的に automated sync を無効化している。
  # 作業完了後に復元すること。
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
