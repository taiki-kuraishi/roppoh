apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-app-deployed.github: ""
spec:
  project: default
  source:
    repoURL: https://github.com/taiki-kuraishi/roppoh
    targetRevision: main
    path: k8s/hermes-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  # NOTE: gemma4/qwen3.6 モデル比較ベンチ実施中、GPU/CPU競合を避けるため hermes-agent を
  # scale 0 で停止している。selfHeal に戻されないよう automated sync も一時無効化。
  # 作業完了後に復元すること。
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
