apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-app-deployed.github: ""
spec:
  project: default
  source:
    repoURL: https://github.com/taiki-kuraishi/roppoh
    targetRevision: main
    path: k8s/garage
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
