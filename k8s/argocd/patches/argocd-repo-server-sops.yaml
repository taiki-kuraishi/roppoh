apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      initContainers:
        - name: download-ksops-and-sops
          image: alpine:3.24
          command:
            - sh
            - -c
            - |
              set -e
              wget -q -O /custom-tools/sops \
                https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
              chmod +x /custom-tools/sops
              wget -q -O /tmp/ksops.tar.gz \
                https://github.com/viaduct-ai/kustomize-sops/releases/download/v4.3.2/ksops_4.3.2_Linux_x86_64.tar.gz
              tar -xzf /tmp/ksops.tar.gz -C /custom-tools ksops
              chmod +x /custom-tools/ksops
          volumeMounts:
            - name: custom-tools
              mountPath: /custom-tools
      containers:
        - name: argocd-repo-server
          env:
            - name: SOPS_AGE_KEY_FILE
              value: /sops/age/keys.txt
            - name: XDG_CONFIG_HOME
              value: /.config
            - name: KUSTOMIZE_PLUGIN_HOME
              value: /.config/kustomize/plugin
          volumeMounts:
            - name: custom-tools
              mountPath: /usr/local/bin/sops
              subPath: sops
            - name: custom-tools
              mountPath: /usr/local/bin/ksops
              subPath: ksops
            - name: sops-age
              mountPath: /sops/age
              readOnly: true
      volumes:
        - name: custom-tools
          emptyDir: {}
        - name: sops-age
          secret:
            secretName: sops-age
