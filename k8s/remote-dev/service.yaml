apiVersion: v1
kind: Service
metadata:
  name: remote-dev
  namespace: remote-dev
  labels:
    app.kubernetes.io/name: remote-dev
    app.kubernetes.io/managed-by: argocd
spec:
  # cloudflared が CF ダッシュボード設定(コード管理外)から
  # ssh://remote-dev.remote-dev.svc.cluster.local:22 を引く。
  type: ClusterIP
  selector:
    app.kubernetes.io/name: remote-dev
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
