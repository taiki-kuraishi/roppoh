apiVersion: viaductoss/v1beta1
kind: ksops
metadata:
  name: ksops-secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - monitoring/grafana-admin.sops.yaml
  - monitoring/grafana-object-storage.sops.yaml
  - monitoring/cf-workers-otlp-token.sops.yaml
  - renovate/renovate-github-app.sops.yaml
  - argocd/argocd-notifications-secret.sops.yaml
  - cloudflared/cloudflared-tunnel-token.sops.yaml
  # discord-gateway-proxy / zot / argo のシークレットは *.sops.yaml.tmpl をコピーして
  # 実値を埋め、`sops -e -i <file>.sops.yaml` で暗号化したのち、以下のコメントを外すこと。
  # （平文の .sops.yaml を列挙すると ksops の復号が失敗し secrets app 全体が壊れるため、
  #   暗号化が済むまで有効化しない）
  # - discord-gateway-proxy/discord-gateway-proxy.sops.yaml
  # - zot/zot-htpasswd.sops.yaml
  # - zot/zot-object-storage.sops.yaml
  # - argo/zot-push-dockerconfig.sops.yaml
  # - argo/build-github-app.sops.yaml
