apiVersion: v1
kind: Service
metadata:
  name: dev-pod
  namespace: dev-pod
  labels:
    app.kubernetes.io/name: dev-pod
    app.kubernetes.io/managed-by: argocd
spec:
  # cloudflared が CF ダッシュボード設定(コード管理外)から
  # ssh://dev-pod.dev-pod.svc.cluster.local:22 を引く。
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dev-pod
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
      protocol: TCP
    # cloudflared が infra/modules/zero-trust/tunnel.tf の ingress 設定から
    # http://dev-pod.dev-pod.svc.cluster.local:6768 を引く(Orca Remote Server)。
    - name: orca
      port: 6768
      targetPort: orca
      protocol: TCP
