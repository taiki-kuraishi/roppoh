apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: llama-cpp
  namespace: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  serviceName: llama-cpp
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-cpp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-cpp
    spec:
      # GPU 搭載ノード(z390 / RTX 3050 6GB)にのみスケジュール
      nodeSelector:
        nvidia.com/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llama-cpp
          # 【自己更新】このイメージタグは Renovate が更新する
          image: ghcr.io/ggml-org/llama.cpp:server-cuda-b9870
          # ENTRYPOINT は llama-server。引数のみ渡す。
          # ── 巨大 MoE を 6GB VRAM で動かす中核戦略 ────────────────────────────
          # Qwen3.5-35B-A3B(総34.66B / アクティブ約3B の MoE)を、
          #   -ngl 99      : 全レイヤーを GPU 指定(attention・共有重み・KV を GPU に載せる)
          #   --cpu-moe    : ただし MoE エキスパート重み(約18GB)は CPU RAM に退避
          # という組み合わせで動かす。VRAM には非エキスパート重み(~2GB)+ KV(~0.7GB)
          # + 計算バッファ(~0.7GB)= 実測 ~3.4GB のみ載り 6GB に収まる。エキスパートは
          # 256個中トークンあたり8個(+共有)しか活性化しないため、CPU(i5-9600K / DDR4)でも
          # 実効 10〜20 tok/s を狙える。Ollama は「レイヤー単位」の粗いオフロードしか持たず
          # attention までも CPU に落ちて 5〜9 tok/s に低下していた(k8s/ollama の統計コメント参照)。
          args:
            # HuggingFace から GGUF を自動取得(LLAMA_CACHE=/data/models に永続キャッシュ)
            - -hf
            - unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
            # OpenAI 互換 /v1/models が返す id。hermes-agent の model.default と一致させる
            - --alias
            - qwen3.5-35b-a3b
            - -ngl
            - "99"
            - --cpu-moe
            # Flash Attention(KV 量子化の前提。コンテキストが伸びるほど VRAM を節約)
            - -fa
            - "on"
            # コンテキスト長。hermes の長いシステムプロンプト/ツール定義(実測 ~9061 トークン)に
            # 余裕を持たせつつ 6GB に収める値。VRAM にはまだ余裕があり実機で 32768 まで引き上げ可
            - -c
            - "16384"
            # KV キャッシュを q8_0 に量子化して VRAM 消費を削減(f16 の約半分)
            - -ctk
            - q8_0
            - -ctv
            - q8_0
            # モデル同梱の Jinja チャットテンプレートを使用(Qwen3.5 の chat/tool 整形に必須)
            - --jinja
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # -hf のダウンロード先。PVC 上に置き Pod 再作成でも再 DL しない
            - name: LLAMA_CACHE
              value: /data/models
            # 非 root 実行のため HOME を書き込み可能な emptyDir に向ける
            - name: HOME
              value: /home/llama
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              # CPU limit は設定しない(MoE のエキスパート計算は CPU 律速。全 6 コアを使わせる)
              # memory limit はノード全体(約30GB)を巻き込む OOM を防ぐ上限。エキスパートは
              # mmap(reclaimable な file page cache)なので通常この上限には達しない
              memory: 26Gi
              # GPU 1基を占有(RTX 3050 6GB)。ollama とは排他(GPU は1基のみ)
              nvidia.com/gpu: 1
          # 初回起動は GGUF(約20GB)のダウンロード + ロードで時間がかかるため、
          # startupProbe で最大 60 分の猶予を与えてから liveness/readiness を有効化する
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: models
              mountPath: /data/models
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/llama
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 40Gi
