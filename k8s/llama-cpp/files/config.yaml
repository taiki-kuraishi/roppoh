# モデル DL(初回 -hf, 最大約20GB)がヘルスチェックで中断されないよう長めに取る
healthCheckTimeout: 3600
logLevel: info
# ${PORT} マクロの起点。各モデルに一意ポートを自動割当
startPort: 10001

# 全モデル共通の llama-server フラグ(MoE 固有の --cpu-moe はモデル側に置く)
# -b/-ub 4096: 大きいプロンプトの prefill を高速化する。ubatch を既定 512 から広げると
#   CPU 上のエキスパート行列演算のバッチ効率が上がり、大プロンプトの TTFT を大幅短縮できる
#   (実測: 512→2048 で prefill 約3倍、12k トークン cold が 186s→59s)。4096 で更に上限を拡張。
macros:
  llama-server: >
    /app/llama-server
    --host 127.0.0.1 --port ${PORT}
    -ngl 99 -fa on --jinja
    -ctk q8_0 -ctv q8_0
    -b 4096 -ub 4096

models:
  # Qwen3.6-35B-A3B 公式 base model(unsloth GGUF、検閲あり)。アーキテクチャは
  # HauhauCS 版と同じだが、unsloth の UD(Dynamic)量子化はテンソルごとに精度配分が
  # 異なりレイヤーあたりの実VRAM使用量がHauhauCS版のQ4_K_Mより大きい。
  # --n-cpu-moe 36 を転用したところ CUDA OOM でクラッシュした実績があり、
  # 安全マージン優先で --cpu-moe(全エキスパート CPU 退避)に変更。
  # 2026-07 実測: --cpu-moe に変更後、ネイティブ上限 262144 のままロードしても
  # 安定動作を確認(実測 VRAM 5559MiB、残り約246MiB)。hidden_size が Gemma4 系より
  # 小さいため、一発でネイティブ上限に到達しこれ以上の拡張余地はない。
  qwen3.6-35b-a3b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0
      --presence-penalty 0.0 --repeat-penalty 1.0
      -c 262144

  # Gemma4-26B-A4B 公式 base model(unsloth GGUF、検閲あり、MTPドラフトヘッドなし)。
  # unsloth の UD(Dynamic)量子化は HauhauCS 版より層あたりの実VRAM使用量が大きい
  # (Qwen3.6 と同傾向)。--n-cpu-moe 29(1層のみGPU化)はS1/S2実測上は安定していた
  # (--cpu-moe比 tg 18.12→18.39 tok/s)が、安全マージン優先で --cpu-moe(全エキスパート
  # CPU 退避)に変更する。
  gemma4-26b-a4b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      -c 131072

  # gemma4-26b-a4b の長文コンテキスト版。qwen3.5-35b-a3b-longctx と同じ方針で、
  # --n-cpu-moe の代わりに --cpu-moe(全エキスパート CPU 退避)にして VRAM を
  # KV キャッシュ側に全振りする。速度より長い履歴保持を優先する用途向け
  # (初回 prefill は --n-cpu-moe 版より遅くなる)。
  # 2026-07 実測(二分探索): ネイティブ上限 262144 は CUDA OOM でクラッシュ
  # (confirmed)。196608 も OOM。163840 は安定動作を確認(実測 VRAM 5485MiB、
  # 残り約320MiB)。gemma4-26b-a4b(c=131072, 実測 VRAM ~5.11GB)から算出した
  # 現実測ベースの実用上限として 163840 を採用する。
  gemma4-26b-a4b-longctx:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      -c 163840

  # gemma4-26b-a4b(上記, Q4_K_M 実測16GB)と同じ非QAT base model・同じ
  # --n-cpu-moe/-ctk/-ctv構成で、量子化レベルだけ落とした比較用エントリ3種
  # (下記 iq4xs/iq3xxs/iq2xxs)。非QATモデルは QAT 版と異なり Q4 未満に
  # 落とすほど MoE のルーティング(router/gate)量子化誤差が乗りやすく、
  # dense モデルより劣化が体感しやすい傾向がある点に留意
  # (UD = Unsloth Dynamic 方式のため router/embedding 等の高感度テンソルは
  # 高精度側に残るが、それでもゼロにはならない)。
  #
  # -c 262144(ネイティブ上限)+ --n-cpu-moe 29(未実測の初期値流用)で投入したところ
  # 全エントリ(iq4xs/iq3xxs/iq2xxs)で起動直後に CUDA OOM とみられるクラッシュが発生し
  # /v1/chat/completions が毎回 500 を返す状態になった(2026-07 確認)。VRAM 実測が
  # 済むまでの暫定対応として、他モデルの `--cpu-moe`(全エキスパートを CPU RAM へ退避)
  # + -c 32768 と同じ保守的な構成に戻す。実測が取れ次第 --n-cpu-moe への移行・
  # context 拡張を再検討する。
  #
  # ファイルサイズ実測(HF content-length): IQ4_XS 12.7GB / IQ3_XXS 10.6GB /
  # IQ2_XXS 9.2GB(参考: Q4_K_M は 16GB)。UD方式のため4bit未満でも高感度
  # テンソルは高精度側に残り、サイズは量子化ビット数ほど単純には縮まない。
  gemma4-26b-a4b-iq4xs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ4_XS
      --cpu-moe --reasoning auto --no-mmproj
      -c 32768

  # 3bit系で最小の IQ3_XXS。上記 iq4xs のコメント参照(同方針)。4bit未満のため
  # MoE ルーティング精度劣化のリスクが iq4xs より高い。
  gemma4-26b-a4b-iq3xxs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ3_XXS
      --cpu-moe --reasoning auto --no-mmproj
      -c 32768

  # 2bit系で最小の IQ2_XXS。上記 iq4xs のコメント参照(同方針)。3エントリ中もっとも
  # 量子化が荒く、品質劣化リスクが最大な一方、モデル重みが最小(9.2GB)。
  gemma4-26b-a4b-iq2xxs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ2_XXS
      --cpu-moe --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-26B-A4B の高精度版(Q6_K, ~21GB)。当初 Q8_0(~28GB)希望だったが z390 ノード RAM が
  # 合計 ~30GB(cgroup limit 26Gi)でタイトなため Q6_K を採用(「ほぼ無劣化」を維持しつつ RAM リスク回避)。
  # --cpu-moe で全エキスパートを CPU RAM へ退避。
  # 2026-07 二分探索(GPU 独占・DL 済み重みで実測): 空き VRAM は c=131072〜194560 の全域で
  # 246MiB 一定(Gemma のハイブリッド sliding-window attention で KV がほぼ頭打ちのため)。
  # 194560 はロード可・196608 は起動時 compute buffer(graph_reserve)で CUDA OOM。崖の直下
  # (194560)は 2048 トークン手前でマージンが薄いため、~16k トークンの余裕を取り 180224 を採用。
  # --temp/--top-p/--top-k は unsloth の gemma-4-26B-A4B 推奨サンプリング(temp 1.0 / top-p 0.95 / top-k 64)。
  gemma4-26b-a4b-q6k:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:Q6_K
      --cpu-moe --reasoning auto --no-mmproj
      --temp 1.0 --top-p 0.95 --top-k 64
      -c 180224

  # 標準版(以前の hermes の default)。MoE 34.66B / アクティブ約3B。
  # --cpu-moe でエキスパートを CPU RAM に退避し実測 VRAM ~4GB で 6GB に収まる。
  # ※ --no-mmap は llama.cpp が起動時に推奨するが、実機(XMP 有効・DDR4 帯域向上後)では
  #   生成が約4%遅くなり、かつ回収不可な匿名メモリを ~20GB 占有したため採用しない(#522 で
  #   検証・revert 済み)。mmap 有効(file-backed page cache)の方が速く省メモリだった。
  # ttl: 最後のリクエストから3600秒アイドルで自動アンロードし GPU を解放する。
  # --reasoning auto: テンプレート/クライアント指定に従う(qwen3.5 は既定で thinking 有効)。
  #   クライアント側が enable_thinking=false を送ればオフにできる。
  qwen3.5-35b-a3b:
    ttl: 3600
    cmd: >
      ${llama-server}
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe
      --reasoning auto
      -c 32768

  # 長文コンテキスト版。VRAM を稼ぐため mmproj を外し KV を q4 に落とし、その分を
  # コンテキスト長に回す(初回 prefill は非常に遅くなる。長い履歴を保持したい用途向け)。
  # macro は使わず個別指定(KV 量子化・mmproj・ubatch が本番と異なるため)。
  qwen3.5-35b-a3b-longctx:
    # hermes の常用モデルのため 3600s 常駐(頻繁なアンロード/再ロードを避ける)
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-12B(Dense、公式 unsloth GGUF)。Qwen/Gemma4-MoE 系と異なり Dense のため
  # --n-cpu-moe による CPU オフロードが効かず、全レイヤーを VRAM(6GB)に載せる必要が
  # ある。マルチモーダル(vision/audio)エンコーダはテキスト Agent 用途では不要なため
  # --no-mmproj で無効化し VRAM を節約する。
  # 2026-07 ベンチ実施記録(PR参照): Q3_K_M(5.69GB)は重み単体で VRAM をほぼ使い切り、
  # -b/-ub 2048 は元より -c 8192 の KV cache 確保にすら失敗し CUDA OOM でクラッシュ
  # (confirmed)。UD-IQ3_XXS(4.64GB)まで量子化を落とし、-b/-ub を 256 まで縮小しても
  # c=131072(128k)は OOM(KV量子化を q4_0 まで落としても解消せず)。二分探索の結果、
  # c=126976 は OOM、c=122880 は安定動作(実測 VRAM 5783MiB、残り約361MiB)を確認した
  # ため 122880 を採用(128k 目標には僅かに届かないが Gemma4-12B は Dense かつ
  # hidden_size が大きく、VRAM 6GB では他の Gemma4 系と異なりこれが実用上の上限)。
  # gemma4-e4b/e2b と異なり VRAM 余裕がほぼ無いため、batch を大きくした prefill
  # 高速化は不可(prefill 速度とのトレードオフ)。
  gemma4-12b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 256 -ub 256
      -hf unsloth/gemma-4-12b-it-GGUF:UD-IQ3_XXS
      --no-mmproj
      -c 122880

  # Gemma4-E4B(Dense/MatFormer、非MoE)。ネイティブ context 128K。gemma4-12b と同様
  # 全レイヤー VRAM 常駐、mmproj 無効化。
  # 2026-07 ベンチ実施記録(PR参照): Q3_K_M(4.06GB)+ -b/-ub 2048 で c=131072 まで
  # 安定動作(実測 VRAM 使用量 5019〜5021MiB で一定、context 深さ 0/8k/32k/93k を通じて
  # 変動なし。Gemma のハイブリッド sliding-window attention により KV cache が
  # ほぼ一定サイズに収まるためと見られる)。VRAM 余裕(残り約1.1GiB)は確保できているが
  # Q4_K_M(4.98GB、+0.92GB)へ上げると残り約200MBまで縮小し危険なため Q3_K_M を採用。
  # ネイティブ context 128K(131072)がベンチ確認済みの安全上限(実測 VRAM 5019MiB、残り約1.1GiB)。
  # 一時 262144 に上げていたが、full-attention 層の KV 確保が 6GB VRAM を超えロード時 CUDA OOM で
  # 即 exit(upstream command exited prematurely)したため 131072 に戻した。
  gemma4-e4b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q8_0 -ctv q8_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-E4B-it-GGUF:Q3_K_M
      --no-mmproj
      -c 131072

  # Gemma4-E2B(Dense/MatFormer、非MoE、ファミリー最小)。ネイティブ context 128K。
  # 2026-07 ベンチ実施記録(PR参照): 最小モデルのため VRAM 余裕が大きく(c=131072 で
  # 実測 VRAM 使用量 3.2GB 前後、cold ~93k プロンプトでも同水準)、E4B/12B と異なり
  # 量子化を上げても問題ない。品質重視で Q5_K_M を採用(残り約2.9GiB の余裕あり)。
  gemma4-e2b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q8_0 -ctv q8_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-E2B-it-GGUF:Q5_K_M
      --no-mmproj
      -c 131072

  # gpt-oss-20b(OpenAI, MoE 21B / active 3.6B)。MoE 重みは MXFP4 ネイティブ(~4.25bpp)で
  # ダウンストリーム量子化ではないため実質無劣化。F16 タグは非-MoE 層を F16 で保持。実体 ~13GB。
  # harmony chat format 必須のため --jinja(GGUF 同梱テンプレート使用)。--cpu-moe で全エキスパートを
  # CPU RAM へ退避。native context 128K。context は保守値 32768 で投入し、Argo 同期後に二分探索で
  # 上限を確定・更新する(TODO: bisect。目標 131072)。--no-mmap は #522 の検証により採用しない。
  gpt-oss-20b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q8_0 -ctv q8_0
      -b 2048 -ub 2048
      -hf unsloth/gpt-oss-20b-GGUF:F16
      --cpu-moe --reasoning auto
      -c 32768

  # openclaw の memory 検索(agents.defaults.memorySearch)用 embedding エンドポイント。
  # llama-server 群はすべてチャット用起動(--embeddings なし)のため /v1/embeddings が
  # 501 を返し memory index が openai へフォールバックして失敗していた。その専用エンドポイント。
  #
  # GPU(RTX 3050 6GB)は chat モデルが占有するため -ngl 0(CPU 実行)にして VRAM を一切使わない。
  # 0.6B と小さく indexing 用途では CPU でも実用速度。下記 groups で persistent 指定し、
  # chat モデルのロード/スワップで unload されず常駐する(embedding は都度必要になるため)。
  # Qwen3-Embedding は last-token pooling 指定が必須(--pooling last)。出力次元 1024。
  qwen3-embedding-0.6b:
    # chat と違い常駐前提(groups.embeddings.persistent)。ttl は unload 抑止のため長めに。
    ttl: 86400
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 0
      --embeddings --pooling last
      -hf Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
      -c 8192 -b 8192 -ub 8192

# モデルの同時ロード制御。従来は暗黙のデフォルト挙動(単一モデルのみ、ロードで他を unload)
# だったが、embedding を chat と同時常駐させるため明示的にグループ分けする。
#   - chat: 従来どおり相互スワップ(swap: true)。exclusive: false で embeddings を unload しない
#   - embeddings: persistent で chat のロード/スワップに巻き込まれず常駐。CPU 実行のため VRAM 競合なし
groups:
  chat:
    swap: true
    exclusive: false
    members:
      - qwen3.6-35b-a3b
      - gemma4-26b-a4b
      - gemma4-26b-a4b-longctx
      - gemma4-26b-a4b-iq4xs
      - gemma4-26b-a4b-iq3xxs
      - gemma4-26b-a4b-iq2xxs
      - qwen3.5-35b-a3b
      - qwen3.5-35b-a3b-longctx
      - gemma4-26b-a4b-q6k
      - gemma4-12b
      - gemma4-e4b
      - gemma4-e2b
      - gpt-oss-20b
  embeddings:
    swap: false
    exclusive: false
    persistent: true
    members:
      - qwen3-embedding-0.6b
