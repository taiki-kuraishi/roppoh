# モデル DL(初回 -hf, 最大約20GB)がヘルスチェックで中断されないよう長めに取る
healthCheckTimeout: 3600
logLevel: info
# ${PORT} マクロの起点。各モデルに一意ポートを自動割当
startPort: 10001

# 全モデル共通の llama-server フラグ(MoE 固有の --cpu-moe はモデル側に置く)
# -b/-ub 4096: 大きいプロンプトの prefill を高速化する。ubatch を既定 512 から広げると
#   CPU 上のエキスパート行列演算のバッチ効率が上がり、大プロンプトの TTFT を大幅短縮できる
#   (実測: 512→2048 で prefill 約3倍、12k トークン cold が 186s→59s)。4096 で更に上限を拡張。
macros:
  llama-server: >
    /app/llama-server
    --host 127.0.0.1 --port ${PORT}
    -ngl 99 -fa on --jinja
    -ctk q8_0 -ctv q8_0
    -b 4096 -ub 4096

models:
  # 現用モデル(hermes の default)。HauhauCS による Qwen3.5-35B-A3B の
  # Uncensored/Aggressive ファインチューン。量子化設定は下記 qwen3.5-35b-a3b-longctx
  # と同じもの(KV q4, mmproj 無効, 長コンテキスト)を流用する。
  #
  # 2026-07 ベンチ結果(z390: i5-9600K / DDR4 32GB / RTX 3050 6GB, 実施記録は
  # PR参照): --cpu-moe(全40層のMoEエキスパートをCPUへ)から --n-cpu-moe 36
  # (先頭36層のみCPU、残り4層はGPU)に変更。VRAM実測に2.6GiB の余剰があり、
  # 4層分(~1.9GiB)なら c=131072 のまま安全に載せられる上限だった
  # (35以下=CUDA OOMでプロセスクラッシュ、confirmed via S1-S3 全ステージ)。
  #   - S1 短文warm tg: 25.68 → 27.71 tok/s (+7.9%)
  #   - S2 cold ~8k TTFT: 172.0s → 29.5s (-83%、prefillの一部がGPU化された効果)
  #   - S3 cold ~32k TTFT: 191.3s → 172.5s (-10%)
  # 量子化・モデル重みは変更していないため品質は現行と同一。
  # (--cache-reuse 256 も検証したが素の連続会話では効果差なし。デフォルトの
  # プロンプトキャッシュで既に追記 turn の TTFT は ~0.8s まで下がるため見送り)
  #
  # context 拡張の検討: -ngl 99 では KV キャッシュも GPU(VRAM)に載るため、
  # context 長の実質的な上限は VRAM(6GB)であって CPU RAM(32GB)ではない。
  # -nkvo(--no-kv-offload)で KV を CPU RAM 側に逃がせばネイティブ最大 262144 まで
  # 拡張できるが、実測 tg 27.71 → 7.52 tok/s(-73%)と壊滅的に遅くなったため不採用。
  # attention 計算がCPU-GPU間コピューを挟むことになりPCIe/CPU側がボトルネックになる
  # ためと見られる。c=131072 (VRAM常駐)が速度とcontext長のバランス上の最適点。
  qwen3.5-35b-a3b-hauhaucs-aggressive:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive:Q4_K_M
      --n-cpu-moe 36 --reasoning auto --no-mmproj
      -c 131072

  # Qwen3.6-35B-A3B(HauhauCS Uncensored Aggressive)。現行 Qwen3.5 系の直接後継で
  # アーキテクチャ据え置き(MoE 40層/256エキスパート/アクティブ約3B)のため、
  # 上記で実測済みの --n-cpu-moe 36 がそのまま安定動作(2026-07 ベンチ実施記録は
  # PR参照)。速度は Qwen3.5 と実測ほぼ同一(S1 tg 27.67 vs 27.71 tok/s、
  # S2 cold TTFT 29.0s vs 29.5s、S3 cold TTFT 171.3s vs 172.5s)。
  # モデル世代が新しいため品質面の入れ替え候補(品質評価は別途要実施、現時点では
  # default は変更していない)。
  qwen3.6-35b-a3b-hauhaucs-aggressive:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive:Q4_K_M
      --n-cpu-moe 36 --reasoning auto --no-mmproj
      -c 131072

  # Qwen3.6-35B-A3B 公式 base model(unsloth GGUF、検閲あり)。アーキテクチャは
  # HauhauCS 版と同じだが、unsloth の UD(Dynamic)量子化はテンソルごとに精度配分が
  # 異なりレイヤーあたりの実VRAM使用量がHauhauCS版のQ4_K_Mより大きい。
  # --n-cpu-moe 36 を転用したところ CUDA OOM でクラッシュしたため実測し直し、
  # --n-cpu-moe 38(2層のみGPU化)が安全な値(--cpu-moe比 tg 23.60→24.20 tok/s、
  # S1/S2とも安定)。無検閲版が不要な用途向けの選択肢として用意する。
  qwen3.6-35b-a3b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/Qwen3.6-35B-A3B-GGUF:Q4_K_M
      --n-cpu-moe 38 --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-26B-A4B(HauhauCS Uncensored Balanced、MTP投機的デコード用ドラフトヘッド同梱)。
  # MoE 30層/128エキスパート/アクティブ約4B。QAT(量子化考慮学習済み)モデルのため
  # Q4_K_M(16.8GB)が最適サイズ(モデルカード曰くそれ以上の量子化は品質向上なし)。
  # hidden_size が Qwen(2048)より大きい(2816)分 VRAM 余剰が狭く(実測1.9GiB)、
  # --n-cpu-moe 27(3層GPU化)は cold ~32k プロンプトで compute buffer 不足により
  # CUDA OOM クラッシュ。--n-cpu-moe 28(2層GPU化)が実測上の安全な上限
  # (2026-07 ベンチ実施記録はPR参照):
  #   - S1 短文warm tg: 17.97 → 20.33 tok/s (+13.1%, --cpu-moe 比)
  #   - S2 cold ~8k TTFT: 27.4s → 25.1s (-8.4%)
  #   - S3 cold ~32k TTFT: 130.4s → 123.3s (-5.4%)
  # 絶対速度は Qwen3.5/3.6 系より遅い(アクティブパラメータが4B > 3Bのため)。
  # MTP投機的デコード(-md でドラフトヘッド指定)は本設定では未検証。
  gemma4-26b-a4b-hauhaucs-balanced:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Gemma4-26B-A4B-QAT-Uncensored-HauhauCS-Balanced-MTP:Q4_K_M
      --n-cpu-moe 28 --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-26B-A4B 公式 base model(unsloth GGUF、検閲あり、MTPドラフトヘッドなし)。
  # unsloth の UD(Dynamic)量子化は HauhauCS 版より層あたりの実VRAM使用量が大きく
  # (Qwen3.6 と同傾向)、--n-cpu-moe 28 の転用では確認していないため保守的に
  # 実測し直し、--n-cpu-moe 29(1層のみGPU化)を採用(--cpu-moe比 tg 18.12→18.39
  # tok/s、S1/S2とも安定)。無検閲版が不要な用途向けの選択肢として用意する。
  gemma4-26b-a4b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:Q4_K_M
      --n-cpu-moe 29 --reasoning auto --no-mmproj
      -c 131072

  # gemma4-26b-a4b(上記, Q4_K_M 実測16GB)と同じ非QAT base model・同じ
  # --n-cpu-moe/-ctk/-ctv構成で、量子化レベルだけ落とした比較用エントリ3種
  # (下記 iq4xs/iq3xxs/iq2xxs)。非QATモデルは QAT 版と異なり Q4 未満に
  # 落とすほど MoE のルーティング(router/gate)量子化誤差が乗りやすく、
  # dense モデルより劣化が体感しやすい傾向がある点に留意
  # (UD = Unsloth Dynamic 方式のため router/embedding 等の高感度テンソルは
  # 高精度側に残るが、それでもゼロにはならない)。
  #
  # -c は3エントリとも 262144(モデルのネイティブ max_position_embeddings。
  # HF config.json で実測確認済み。gemma4-e4b/e2b と同じネイティブ上限で、
  # 131072 は VRAM 都合の保守値でしかない)を優先採用する。--n-cpu-moe は
  # 上記 gemma4-26b-a4b の実測済み安全値 29 をそのまま初期値として流用するが、
  # 量子化・context 条件が変わるため実測必須。ベンチ手順:
  #   (1) --n-cpu-moe 29 のまま -c 262144 でロードし OOM しないか確認
  #   (2) VRAM に余裕があれば --n-cpu-moe を二分探索で下げ、GPU常駐層を増やす
  #   (本ファイルの他エントリと同じ実測ベースの手法。VRAM拡張は
  #    「まずcontext優先、余れば--n-cpu-moe」の順で使う)
  #
  # ファイルサイズ実測(HF content-length): IQ4_XS 12.7GB / IQ3_XXS 10.6GB /
  # IQ2_XXS 9.2GB(参考: Q4_K_M は 16GB)。UD方式のため4bit未満でも高感度
  # テンソルは高精度側に残り、サイズは量子化ビット数ほど単純には縮まない。
  gemma4-26b-a4b-iq4xs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ4_XS
      --n-cpu-moe 29 --reasoning auto --no-mmproj
      -c 262144

  # 3bit系で最小の IQ3_XXS。上記 iq4xs のコメント参照(同方針・同 --n-cpu-moe
  # 初期値)。4bit未満のため MoE ルーティング精度劣化のリスクが iq4xs より高い。
  gemma4-26b-a4b-iq3xxs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ3_XXS
      --n-cpu-moe 29 --reasoning auto --no-mmproj
      -c 262144

  # 2bit系で最小の IQ2_XXS。上記 iq4xs のコメント参照(同方針・同 --n-cpu-moe
  # 初期値)。3エントリ中もっとも量子化が荒く、品質劣化リスクが最大な一方、
  # モデル重みが最小(9.2GB)なので --n-cpu-moe を下げた際の CPU 側展開負荷も
  # もっとも軽く、速度面の伸びしろは大きい可能性がある。
  gemma4-26b-a4b-iq2xxs:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-26B-A4B-it-GGUF:IQ2_XXS
      --n-cpu-moe 29 --reasoning auto --no-mmproj
      -c 262144

  # 標準版(以前の hermes の default)。MoE 34.66B / アクティブ約3B。
  # --cpu-moe でエキスパートを CPU RAM に退避し実測 VRAM ~4GB で 6GB に収まる。
  # ※ --no-mmap は llama.cpp が起動時に推奨するが、実機(XMP 有効・DDR4 帯域向上後)では
  #   生成が約4%遅くなり、かつ回収不可な匿名メモリを ~20GB 占有したため採用しない(#522 で
  #   検証・revert 済み)。mmap 有効(file-backed page cache)の方が速く省メモリだった。
  # ttl: 最後のリクエストから3600秒アイドルで自動アンロードし GPU を解放する。
  # --reasoning auto: テンプレート/クライアント指定に従う(qwen3.5 は既定で thinking 有効)。
  #   クライアント側が enable_thinking=false を送ればオフにできる。
  qwen3.5-35b-a3b:
    ttl: 3600
    cmd: >
      ${llama-server}
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe
      --reasoning auto
      -c 32768

  # 長文コンテキスト版。VRAM を稼ぐため mmproj を外し KV を q4 に落とし、その分を
  # コンテキスト長に回す(初回 prefill は非常に遅くなる。長い履歴を保持したい用途向け)。
  # macro は使わず個別指定(KV 量子化・mmproj・ubatch が本番と異なるため)。
  qwen3.5-35b-a3b-longctx:
    # hermes の常用モデルのため 3600s 常駐(頻繁なアンロード/再ロードを避ける)
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-12B(Dense、公式 unsloth GGUF)。Qwen/Gemma4-MoE 系と異なり Dense のため
  # --n-cpu-moe による CPU オフロードが効かず、全レイヤーを VRAM(6GB)に載せる必要が
  # ある。マルチモーダル(vision/audio)エンコーダはテキスト Agent 用途では不要なため
  # --no-mmproj で無効化し VRAM を節約する。
  # 2026-07 ベンチ実施記録(PR参照): Q3_K_M(5.69GB)は重み単体で VRAM をほぼ使い切り、
  # -b/-ub 2048 は元より -c 8192 の KV cache 確保にすら失敗し CUDA OOM でクラッシュ
  # (confirmed)。UD-IQ3_XXS(4.64GB)まで量子化を落とし、-b/-ub を 256 まで縮小しても
  # c=131072(128k)は OOM(KV量子化を q4_0 まで落としても解消せず)。二分探索の結果、
  # c=126976 は OOM、c=122880 は安定動作(実測 VRAM 5783MiB、残り約361MiB)を確認した
  # ため 122880 を採用(128k 目標には僅かに届かないが Gemma4-12B は Dense かつ
  # hidden_size が大きく、VRAM 6GB では他の Gemma4 系と異なりこれが実用上の上限)。
  # gemma4-e4b/e2b と異なり VRAM 余裕がほぼ無いため、batch を大きくした prefill
  # 高速化は不可(prefill 速度とのトレードオフ)。
  gemma4-12b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 256 -ub 256
      -hf unsloth/gemma-4-12b-it-GGUF:UD-IQ3_XXS
      --no-mmproj
      -c 122880

  # Gemma4-E4B(Dense/MatFormer、非MoE)。ネイティブ context 128K。gemma4-12b と同様
  # 全レイヤー VRAM 常駐、mmproj 無効化。
  # 2026-07 ベンチ実施記録(PR参照): Q3_K_M(4.06GB)+ -b/-ub 2048 で c=131072 まで
  # 安定動作(実測 VRAM 使用量 5019〜5021MiB で一定、context 深さ 0/8k/32k/93k を通じて
  # 変動なし。Gemma のハイブリッド sliding-window attention により KV cache が
  # ほぼ一定サイズに収まるためと見られる)。VRAM 余裕(残り約1.1GiB)は確保できているが
  # Q4_K_M(4.98GB、+0.92GB)へ上げると残り約200MBまで縮小し危険なため Q3_K_M を採用。
  gemma4-e4b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q8_0 -ctv q8_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-E4B-it-GGUF:Q3_K_M
      --no-mmproj
      -c 131072

  # Gemma4-E2B(Dense/MatFormer、非MoE、ファミリー最小)。ネイティブ context 128K。
  # 2026-07 ベンチ実施記録(PR参照): 最小モデルのため VRAM 余裕が大きく(c=131072 で
  # 実測 VRAM 使用量 3.2GB 前後、cold ~93k プロンプトでも同水準)、E4B/12B と異なり
  # 量子化を上げても問題ない。品質重視で Q5_K_M を採用(残り約2.9GiB の余裕あり)。
  gemma4-e2b:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q8_0 -ctv q8_0
      -b 2048 -ub 2048
      -hf unsloth/gemma-4-E2B-it-GGUF:Q5_K_M
      --no-mmproj
      -c 131072

  # openclaw の memory 検索(agents.defaults.memorySearch)用 embedding エンドポイント。
  # llama-server 群はすべてチャット用起動(--embeddings なし)のため /v1/embeddings が
  # 501 を返し memory index が openai へフォールバックして失敗していた。その専用エンドポイント。
  #
  # GPU(RTX 3050 6GB)は chat モデルが占有するため -ngl 0(CPU 実行)にして VRAM を一切使わない。
  # 0.6B と小さく indexing 用途では CPU でも実用速度。下記 groups で persistent 指定し、
  # chat モデルのロード/スワップで unload されず常駐する(embedding は都度必要になるため)。
  # Qwen3-Embedding は last-token pooling 指定が必須(--pooling last)。出力次元 1024。
  qwen3-embedding-0.6b:
    # chat と違い常駐前提(groups.embeddings.persistent)。ttl は unload 抑止のため長めに。
    ttl: 86400
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 0
      --embeddings --pooling last
      -hf Qwen/Qwen3-Embedding-0.6B-GGUF:Q8_0
      -c 8192 -b 8192 -ub 8192

# モデルの同時ロード制御。従来は暗黙のデフォルト挙動(単一モデルのみ、ロードで他を unload)
# だったが、embedding を chat と同時常駐させるため明示的にグループ分けする。
#   - chat: 従来どおり相互スワップ(swap: true)。exclusive: false で embeddings を unload しない
#   - embeddings: persistent で chat のロード/スワップに巻き込まれず常駐。CPU 実行のため VRAM 競合なし
groups:
  chat:
    swap: true
    exclusive: false
    members:
      - qwen3.5-35b-a3b-hauhaucs-aggressive
      - qwen3.6-35b-a3b-hauhaucs-aggressive
      - qwen3.6-35b-a3b
      - gemma4-26b-a4b-hauhaucs-balanced
      - gemma4-26b-a4b
      - gemma4-26b-a4b-iq4xs
      - gemma4-26b-a4b-iq3xxs
      - gemma4-26b-a4b-iq2xxs
      - qwen3.5-35b-a3b
      - qwen3.5-35b-a3b-longctx
      - gemma4-12b
      - gemma4-e4b
      - gemma4-e2b
  embeddings:
    swap: false
    exclusive: false
    persistent: true
    members:
      - qwen3-embedding-0.6b
