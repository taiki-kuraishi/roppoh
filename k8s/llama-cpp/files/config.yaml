# モデル DL(初回 -hf, 最大約20GB)がヘルスチェックで中断されないよう長めに取る
healthCheckTimeout: 3600
logLevel: info
# ${PORT} マクロの起点。各モデルに一意ポートを自動割当
startPort: 10001

# 全モデル共通の llama-server フラグ(MoE 固有の --cpu-moe はモデル側に置く)
# -b/-ub 4096: 大きいプロンプトの prefill を高速化する。ubatch を既定 512 から広げると
#   CPU 上のエキスパート行列演算のバッチ効率が上がり、大プロンプトの TTFT を大幅短縮できる
#   (実測: 512→2048 で prefill 約3倍、12k トークン cold が 186s→59s)。4096 で更に上限を拡張。
macros:
  llama-server: >
    /app/llama-server
    --host 127.0.0.1 --port ${PORT}
    -ngl 99 -fa on --jinja
    -ctk q8_0 -ctv q8_0
    -b 4096 -ub 4096

models:
  # 現用モデル(hermes の default)。HauhauCS による Qwen3.5-35B-A3B の
  # Uncensored/Aggressive ファインチューン。量子化設定は下記 qwen3.5-35b-a3b-longctx
  # と同じもの(KV q4, mmproj 無効, 長コンテキスト)を流用する。
  #
  # 2026-07 ベンチ結果(z390: i5-9600K / DDR4 32GB / RTX 3050 6GB, 実施記録は
  # PR参照): --cpu-moe(全40層のMoEエキスパートをCPUへ)から --n-cpu-moe 36
  # (先頭36層のみCPU、残り4層はGPU)に変更。VRAM実測に2.6GiB の余剰があり、
  # 4層分(~1.9GiB)なら c=131072 のまま安全に載せられる上限だった
  # (35以下=CUDA OOMでプロセスクラッシュ、confirmed via S1-S3 全ステージ)。
  #   - S1 短文warm tg: 25.68 → 27.71 tok/s (+7.9%)
  #   - S2 cold ~8k TTFT: 172.0s → 29.5s (-83%、prefillの一部がGPU化された効果)
  #   - S3 cold ~32k TTFT: 191.3s → 172.5s (-10%)
  # 量子化・モデル重みは変更していないため品質は現行と同一。
  # (--cache-reuse 256 も検証したが素の連続会話では効果差なし。デフォルトの
  # プロンプトキャッシュで既に追記 turn の TTFT は ~0.8s まで下がるため見送り)
  #
  # context 拡張の検討: -ngl 99 では KV キャッシュも GPU(VRAM)に載るため、
  # context 長の実質的な上限は VRAM(6GB)であって CPU RAM(32GB)ではない。
  # -nkvo(--no-kv-offload)で KV を CPU RAM 側に逃がせばネイティブ最大 262144 まで
  # 拡張できるが、実測 tg 27.71 → 7.52 tok/s(-73%)と壊滅的に遅くなったため不採用。
  # attention 計算がCPU-GPU間コピューを挟むことになりPCIe/CPU側がボトルネックになる
  # ためと見られる。c=131072 (VRAM常駐)が速度とcontext長のバランス上の最適点。
  qwen3.5-35b-a3b-hauhaucs-aggressive:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive:Q4_K_M
      --n-cpu-moe 36 --reasoning auto --no-mmproj
      -c 131072

  # Qwen3.6-35B-A3B(HauhauCS Uncensored Aggressive)。現行 Qwen3.5 系の直接後継で
  # アーキテクチャ据え置き(MoE 40層/256エキスパート/アクティブ約3B)のため、
  # 上記で実測済みの --n-cpu-moe 36 がそのまま安定動作(2026-07 ベンチ実施記録は
  # PR参照)。速度は Qwen3.5 と実測ほぼ同一(S1 tg 27.67 vs 27.71 tok/s、
  # S2 cold TTFT 29.0s vs 29.5s、S3 cold TTFT 171.3s vs 172.5s)。
  # モデル世代が新しいため品質面の入れ替え候補(品質評価は別途要実施、現時点では
  # default は変更していない)。
  qwen3.6-35b-a3b-hauhaucs-aggressive:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive:Q4_K_M
      --n-cpu-moe 36 --reasoning auto --no-mmproj
      -c 131072

  # Gemma4-26B-A4B(HauhauCS Uncensored Balanced、MTP投機的デコード用ドラフトヘッド同梱)。
  # MoE 30層/128エキスパート/アクティブ約4B。QAT(量子化考慮学習済み)モデルのため
  # Q4_K_M(16.8GB)が最適サイズ(モデルカード曰くそれ以上の量子化は品質向上なし)。
  # hidden_size が Qwen(2048)より大きい(2816)分 VRAM 余剰が狭く(実測1.9GiB)、
  # --n-cpu-moe 27(3層GPU化)は cold ~32k プロンプトで compute buffer 不足により
  # CUDA OOM クラッシュ。--n-cpu-moe 28(2層GPU化)が実測上の安全な上限
  # (2026-07 ベンチ実施記録はPR参照):
  #   - S1 短文warm tg: 17.97 → 20.33 tok/s (+13.1%, --cpu-moe 比)
  #   - S2 cold ~8k TTFT: 27.4s → 25.1s (-8.4%)
  #   - S3 cold ~32k TTFT: 130.4s → 123.3s (-5.4%)
  # 絶対速度は Qwen3.5/3.6 系より遅い(アクティブパラメータが4B > 3Bのため)。
  # MTP投機的デコード(-md でドラフトヘッド指定)は本設定では未検証。
  gemma4-26b-a4b-hauhaucs-balanced:
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf HauhauCS/Gemma4-26B-A4B-QAT-Uncensored-HauhauCS-Balanced-MTP:Q4_K_M
      --n-cpu-moe 28 --reasoning auto --no-mmproj
      -c 131072

  # 標準版(以前の hermes の default)。MoE 34.66B / アクティブ約3B。
  # --cpu-moe でエキスパートを CPU RAM に退避し実測 VRAM ~4GB で 6GB に収まる。
  # ※ --no-mmap は llama.cpp が起動時に推奨するが、実機(XMP 有効・DDR4 帯域向上後)では
  #   生成が約4%遅くなり、かつ回収不可な匿名メモリを ~20GB 占有したため採用しない(#522 で
  #   検証・revert 済み)。mmap 有効(file-backed page cache)の方が速く省メモリだった。
  # ttl: 最後のリクエストから3600秒アイドルで自動アンロードし GPU を解放する。
  # --reasoning auto: テンプレート/クライアント指定に従う(qwen3.5 は既定で thinking 有効)。
  #   クライアント側が enable_thinking=false を送ればオフにできる。
  qwen3.5-35b-a3b:
    ttl: 3600
    cmd: >
      ${llama-server}
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe
      --reasoning auto
      -c 32768

  # 長文コンテキスト版。VRAM を稼ぐため mmproj を外し KV を q4 に落とし、その分を
  # コンテキスト長に回す(初回 prefill は非常に遅くなる。長い履歴を保持したい用途向け)。
  # macro は使わず個別指定(KV 量子化・mmproj・ubatch が本番と異なるため)。
  qwen3.5-35b-a3b-longctx:
    # hermes の常用モデルのため 3600s 常駐(頻繁なアンロード/再ロードを避ける)
    ttl: 3600
    cmd: >
      /app/llama-server --host 127.0.0.1 --port ${PORT}
      -ngl 99 -fa on --jinja
      -ctk q4_0 -ctv q4_0
      -b 2048 -ub 2048
      -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
      --cpu-moe --reasoning auto --no-mmproj
      -c 131072
