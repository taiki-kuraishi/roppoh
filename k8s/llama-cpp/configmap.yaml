apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-config
  namespace: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp
    app.kubernetes.io/managed-by: argocd
data:
  # llama-swap の設定。単一 GPU(RTX 3050 6GB)上で複数モデルを on-demand スワップする。
  # リクエストされた model 名(= 下記 models の各キー)に応じて llama-server プロセスを
  # 起動/停止する。GPU は1基のみのため、新しいモデルが要求されると llama-swap が
  # 実行中のモデルを自動停止してから起動する(デフォルトの swap 挙動)。
  # 別モデルを試したいときは models にブロックを1つ足す(またはコメントを外す)だけでよく、
  # StatefulSet の書き換え/再デプロイは不要。hermes/openclaw はエンドポイント固定のまま
  # model 名を変えるだけで切り替わる。
  config.yaml: |
    # モデル DL(初回 -hf, 最大約20GB)がヘルスチェックで中断されないよう長めに取る
    healthCheckTimeout: 3600
    logLevel: info
    # ${PORT} マクロの起点。各モデルに一意ポートを自動割当
    startPort: 10001

    # 全モデル共通の llama-server フラグ(MoE 固有の --cpu-moe はモデル側に置く)
    # -b/-ub 4096: 大きいプロンプトの prefill を高速化する。ubatch を既定 512 から広げると
    #   CPU 上のエキスパート行列演算のバッチ効率が上がり、大プロンプトの TTFT を大幅短縮できる
    #   (実測: 512→2048 で prefill 約3倍、12k トークン cold が 186s→59s)。4096 で更に上限を拡張。
    macros:
      llama-server: >
        /app/llama-server
        --host 127.0.0.1 --port ${PORT}
        -ngl 99 -fa on --jinja
        -ctk q8_0 -ctv q8_0
        -b 4096 -ub 4096

    models:
      # 現用モデル(hermes の default)。MoE 34.66B / アクティブ約3B。
      # --cpu-moe でエキスパートを CPU RAM に退避し実測 VRAM ~4GB で 6GB に収まる。
      # ※ --no-mmap は llama.cpp が起動時に推奨するが、実機(XMP 有効・DDR4 帯域向上後)では
      #   生成が約4%遅くなり、かつ回収不可な匿名メモリを ~20GB 占有したため採用しない(#522 で
      #   検証・revert 済み)。mmap 有効(file-backed page cache)の方が速く省メモリだった。
      # ttl: 最後のリクエストから3600秒アイドルで自動アンロードし GPU を解放する。
      # --reasoning off: qwen3.5 は thinking モデルで、既定(auto)だと簡単な質問でも大量の
      #   思考トークンを生成し応答が遅くなる。hermes/openclaw とも思考は不要なため、サーバ側で
      #   既定 enable_thinking=false を強制し、生成後半の無駄な思考トークンを抑える。
      qwen3.5-35b-a3b:
        ttl: 3600
        cmd: >
          ${llama-server}
          -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
          --cpu-moe
          --reasoning off
          -c 32768

      # 長文コンテキスト版。VRAM を稼ぐため mmproj を外し KV を q4 に落とし、その分を
      # コンテキスト長に回す(初回 prefill は非常に遅くなる。長い履歴を保持したい用途向け)。
      # macro は使わず個別指定(KV 量子化・mmproj・ubatch が本番と異なるため)。
      qwen3.5-35b-a3b-longctx:
        ttl: 600
        cmd: >
          /app/llama-server --host 127.0.0.1 --port ${PORT}
          -ngl 99 -fa on --jinja
          -ctk q4_0 -ctv q4_0
          -b 2048 -ub 2048
          -hf unsloth/Qwen3.5-35B-A3B-GGUF:Q4_K_M
          --cpu-moe --reasoning off --no-mmproj
          -c 131072

      # --- 実験用スロット(コメントを外す/編集して試す。初回リクエスト時に DL される) ---
      # ※ モデル用 PVC(40Gi)の空きに注意。大きな GGUF を複数常駐させると溢れる。
      # qwen3-30b-a3b:
      #   ttl: 3600
      #   cmd: >
      #     ${llama-server}
      #     -hf unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF:Q4_K_M
      #     --cpu-moe
      #     -c 16384
