apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  serviceName: ollama
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      # GPU搭載ノード(z390)にのみスケジュール
      nodeSelector:
        nvidia.com/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          # 【自己更新】このイメージタグは Renovate が更新する
          image: ollama/ollama:0.30.11
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            # デフォルト（4096）だと opencode 等の長いシステムプロンプト/ツール定義で溢れるため拡張
            # 262144（ネイティブ最大）だと GPU VRAM 6GB に収まらず大半がCPUオフロードされ
            # 生成速度が実用に耐えないほど低下する（実測 5〜9 tokens/s）。実機スイープの結果、
            # 32768 は元のエラー原因(9061トークン)に3倍以上の余裕を持ちつつ速度低下を抑えられる値
            - name: OLLAMA_CONTEXT_LENGTH
              value: "32768"
            # Flash Attention を有効化（コンテキストが伸びるほどメモリ使用量を削減）
            - name: OLLAMA_FLASH_ATTENTION
              value: "1"
            # KVキャッシュを量子化してVRAM消費を削減（デフォルトはf16）
            - name: OLLAMA_KV_CACHE_TYPE
              value: "q4_0"
            # 同時にロードするモデルを1つに制限（GPU VRAM 6GB のため節約）
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            # アイドル後5分でモデルをアンロード（-1 で常駐）
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            # 非 root 実行のためデフォルト ~/.ollama から変更
            - name: OLLAMA_MODELS
              value: /data/models
            - name: HOME
              value: /home/ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              # CPU limit は設定しない（CFS スロットリング回避。requestで既に優先度は確保済み）
              # memory limit はノード全体(約30GB)を巻き込む OOM を防ぐための上限として維持
              memory: 24Gi
              # GPU 1基を占有（RTX 3050 6GB）
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /data/models
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/ollama
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
