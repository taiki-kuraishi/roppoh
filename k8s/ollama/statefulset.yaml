apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: ollama
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  serviceName: ollama
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          # 【自己更新】このイメージタグは Renovate が更新する
          image: ollama/ollama:0.30.11
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            # 同時にロードするモデルを1つに制限（N100 CPU 推論・メモリ節約）
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            # アイドル後5分でモデルをアンロード（-1 で常駐）
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            # 非 root 実行のためデフォルト ~/.ollama から変更
            - name: OLLAMA_MODELS
              value: /data/models
            - name: HOME
              value: /home/ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              # N100 は 4 コア。モデルロード中に他の処理を圧迫しないよう上限を設定
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: models
              mountPath: /data/models
            - name: tmp
              mountPath: /tmp
            - name: home
              mountPath: /home/ollama
      volumes:
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
