apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/managed-by: argocd
data:
  # Garage 設定（シークレットは含めない）。
  # GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN は garage-secrets Secret から env で注入される。
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir     = "/var/lib/garage/data"
    db_engine    = "lmdb"

    # シングルノード構成: replication_factor は必ず 1
    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    # rpc_secret は GARAGE_RPC_SECRET 環境変数で注入

    [s3_api]
    api_bind_addr = "[::]:3900"
    # zot の storageDriver.region と一致させる
    s3_region     = "garage"

    [admin]
    api_bind_addr = "[::]:3903"
    # admin_token は GARAGE_ADMIN_TOKEN 環境変数で注入
