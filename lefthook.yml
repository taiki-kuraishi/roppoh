output:
  - meta
  - summary
  - success
  - failure
  - execution_info
  - skips

pre-commit:
  parallel: true
  commands:
    install:
      run: mise exec -- bun install --frozen-lockfile --dry-run
    oxfmt:
      stage_fixed: true
      exclude: "**/*.png"
      run: mise exec -- bun run oxfmt
    oxlint:
      stage_fixed: true
      run: mise exec -- bun run oxlint
    build:
      run: mise exec -- turbo build
    type-check:root:
      run: mise exec -- bun run type-check
    type-check:turbo:
      run: mise exec -- turbo type-check
    cf-typegen:
      stage_fixed: true
      run: mise exec -- turbo cf-typegen
    knip:
      run: mise exec -- bun run knip
    terraform-fmt:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- terraform fmt -recursive
      stage_fixed: true
    terraform-validate:
      root: infra/env/prod
      glob: "infra/**/*.tf"
      run: mise exec -- terraform validate
    tflint:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- tflint
    go-lint:
      glob: "**/*.go"
      run: mise exec -- golangci-lint run --fix
      stage_fixed: true
    kubeconform:
      glob: "k8s/**/*.{yml,yaml}"
      run: >-
        mise exec -- kubeconform
        -summary
        -ignore-missing-schemas
        -ignore-filename-pattern=.*\.sops\.yaml
        -ignore-filename-pattern=.*/patches/.*
        -ignore-filename-pattern=.*/dashboards/.*
        -ignore-filename-pattern=.*/files/.*
        k8s
    kube-linter:
      glob: "k8s/**/*.{yml,yaml}"
      run: mise exec -- kube-linter lint k8s --config .kube-linter.yaml
