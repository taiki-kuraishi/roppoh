pre-commit:
  parallel: true
  commands:
    install:
      run: bun install --frozen-lockfile --dry-run
    oxfmt:
      stage_fixed: true
      exclude: "**/*.png"
      run: mise exec -- oxfmt
    oxlint:
      stage_fixed: true
      run: bun run oxlint
    build:
      run: turbo build
    type-check:root:
      run: bun run type-check
    type-check:turbo:
      run: turbo type-check
    cf-typegen:
      stage_fixed: true
      run: turbo cf-typegen
    knip:
      run: bun run knip
    terraform-fmt:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- terraform fmt -recursive
      stage_fixed: true
    terraform-validate:
      root: infra/env/prod
      glob: "infra/**/*.tf"
      run: mise exec -- terraform validate
    tflint:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- tflint
    go-lint:
      glob: "**/*.go"
      run: mise exec -- golangci-lint run --fix
      stage_fixed: true
    kubeconform:
      glob: "k8s/**/*.{yml,yaml}"
      run: mise exec -- kubeconform -summary -ignore-missing-schemas k8s
    kube-linter:
      glob: "k8s/**/*.{yml,yaml}"
      run: mise exec -- kube-linter lint k8s --config .kube-linter.yaml
