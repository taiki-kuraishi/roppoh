pre-commit:
  parallel: true
  commands:
    install:
      run: bun install --frozen-lockfile --dry-run
    oxfmt:
      stage_fixed: true
      exclude: "**/*.png"
      run: bun run oxfmt
    oxlint:
      stage_fixed: true
      run: bun run oxlint
    build:
      run: turbo build
    type-check:root:
      run: bun run type-check
    type-check:turbo:
      run: turbo type-check
    cf-typegen:
      stage_fixed: true
      run: turbo cf-typegen
    knip:
      run: bun run knip
    terraform-fmt:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- terraform fmt -recursive
      stage_fixed: true
    terraform-validate:
      root: infra/env/prod
      glob: "infra/**/*.tf"
      run: mise exec -- terraform validate
    tflint:
      root: infra
      glob: "infra/**/*.tf"
      run: mise exec -- tflint
