name: Setup playwright
description: Setup playwright with deps

runs:
  using: "composite"
  steps:
    - uses: actions/cache/restore@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
        restore-keys: ${{ runner.os }}-playwright-
    - shell: bash
      working-directory: apps/web-console
      # The chromium download occasionally hangs after reaching 100% instead
      # Of extracting, with no output until the job times out. Retry with a
      # Short per-attempt timeout instead of burning the whole job budget.
      run: |
        for attempt in 1 2 3; do
          if timeout 3m bunx playwright install chromium; then
            exit 0
          fi
          echo "playwright install attempt ${attempt} timed out, retrying..."
        done
        exit 1
    - uses: actions/cache/save@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
