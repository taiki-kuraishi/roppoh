name: Setup playwright
description: Setup playwright with deps

runs:
  using: "composite"
  steps:
    - uses: actions/cache/restore@v6
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
        restore-keys: ${{ runner.os }}-playwright-
    - shell: bash
      working-directory: apps/web-console
      # Run via node directly (not bunx): Bun's fetch/stream implementation
      # Was a likely culprit for occasional hangs on this large binary
      # Download.
      run: node ./node_modules/.bin/playwright install chromium
    - uses: actions/cache/save@v6
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
