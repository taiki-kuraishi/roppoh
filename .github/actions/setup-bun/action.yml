name: Setup Bun
description: Setup Bun runtime, cache, and install dependencies

inputs:
  garage-access-key-id:
    description: Garage S3 access key id for the roppoh-ci-cache bucket
    required: true
  garage-secret-access-key:
    description: Garage S3 secret access key for the roppoh-ci-cache bucket
    required: true

runs:
  using: "composite"
  steps:
    # Keep this version in sync with the bun version specified in mise.toml
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.12
    - uses: whywaita/actions-cache-s3@v3-s3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-
        aws-s3-bucket: roppoh-ci-cache
        aws-access-key-id: ${{ inputs.garage-access-key-id }}
        aws-secret-access-key: ${{ inputs.garage-secret-access-key }}
        aws-region: garage
        aws-endpoint: http://garage.garage.svc.cluster.local:3900
        aws-s3-bucket-endpoint: false
        aws-s3-force-path-style: true
    - shell: bash
      run: bun install --frozen-lockfile
