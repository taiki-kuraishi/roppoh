name: Setup Go
description: Setup Go toolchain and golangci-lint via mise, with module cache

runs:
  using: "composite"
  steps:
    - uses: jdx/mise-action@v4
      with:
        install_args: "go golangci-lint"
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-
