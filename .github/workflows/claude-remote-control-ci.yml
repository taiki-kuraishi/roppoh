name: claude-remote-control-ci

on:
  push:
    branches:
      - main
    paths:
      - ".docker/claude-remote-control/**"
      - ".github/workflows/claude-remote-control-ci.yml"
      - "mise.toml"
      - ".mise-tasks/test/unit/claude-remote-control"
  pull_request:
    paths:
      - ".docker/claude-remote-control/**"
      - ".github/workflows/claude-remote-control-ci.yml"
      - "mise.toml"
      - ".mise-tasks/test/unit/claude-remote-control"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: Run bin scripts unit tests (bats)
        run: mise run test:unit:claude-remote-control
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build claude-remote-control image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/claude-remote-control/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: claude-remote-control:ci
          cache-from: type=gha,scope=claude-remote-control
          cache-to: type=gha,mode=max,scope=claude-remote-control
