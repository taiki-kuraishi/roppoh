name: terraform-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"
      - "mise.toml"
  workflow_dispatch:

jobs:
  prod:
    runs-on: roppoh-runners
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infra/env/prod
    steps:
      - uses: actions/checkout@v7
      - uses: whywaita/actions-cache-s3@v3-s3
        with:
          path: ~/.local/share/mise
          key: mise-v1-${{ runner.os }}-${{ hashFiles('mise.lock') }}
          aws-s3-bucket: roppoh-ci-cache
          aws-access-key-id: ${{ secrets.GARAGE_CI_CACHE_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.GARAGE_CI_CACHE_SECRET_ACCESS_KEY }}
          aws-region: garage
          aws-endpoint: http://garage.garage.svc.cluster.local:3900
          aws-s3-bucket-endpoint: false
          aws-s3-force-path-style: true
      - uses: jdx/mise-action@v4
        with:
          cache: false
      - name: terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - run: tflint --init
      - run: tflint
