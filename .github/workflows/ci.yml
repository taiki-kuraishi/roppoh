name: ci
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: roppoh-runners
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: whywaita/actions-cache-s3@v3-s3
        with:
          path: ~/.local/share/mise
          key: mise-v1-${{ runner.os }}-${{ hashFiles('mise.lock') }}
          aws-s3-bucket: roppoh-ci-cache
          aws-access-key-id: ${{ secrets.GARAGE_CI_CACHE_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.GARAGE_CI_CACHE_SECRET_ACCESS_KEY }}
          aws-region: garage
          aws-endpoint: http://garage.garage.svc.cluster.local:3900
          aws-s3-bucket-endpoint: false
          aws-s3-force-path-style: true
      - uses: jdx/mise-action@v4
        with:
          cache: false
      - run: oxfmt --check
      - run: lefthook validate
