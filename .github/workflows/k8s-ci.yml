name: k8s-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "k8s/**"
      - ".kube-linter.yaml"
      - ".github/workflows/k8s-ci.yml"
      - "mise.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  k8s:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: kubeconform (validate)
        run: |
          find k8s -name "*.yaml" -not -name "*.sops.yaml" -not -path "*/patches/*" \
            | xargs kubeconform -summary -ignore-missing-schemas
      - name: kube-linter (lint)
        run: kube-linter lint k8s --config .kube-linter.yaml
