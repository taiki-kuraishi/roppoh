name: remote-dev-ci

on:
  push:
    branches:
      - main
    paths:
      - ".docker/remote-dev/**"
      - ".github/workflows/remote-dev-ci.yml"
  pull_request:
    paths:
      - ".docker/remote-dev/**"
      - ".github/workflows/remote-dev-ci.yml"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build remote-dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/remote-dev/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: remote-dev:ci
          cache-from: type=gha,scope=remote-dev
          cache-to: type=gha,mode=max,scope=remote-dev
