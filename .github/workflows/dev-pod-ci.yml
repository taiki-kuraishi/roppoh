name: dev-pod-ci

on:
  push:
    branches:
      - main
    paths:
      - ".docker/dev-pod/**"
      - ".github/workflows/dev-pod-ci.yml"
      - "mise.toml"
      - ".mise-tasks/test/unit/dev-pod"
  pull_request:
    paths:
      - ".docker/dev-pod/**"
      - ".github/workflows/dev-pod-ci.yml"
      - "mise.toml"
      - ".mise-tasks/test/unit/dev-pod"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: Run bin scripts unit tests (bats)
        run: mise run test:unit:dev-pod
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build dev-pod image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/dev-pod/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: dev-pod:ci
          cache-from: type=gha,scope=dev-pod
          cache-to: type=gha,mode=max,scope=dev-pod
