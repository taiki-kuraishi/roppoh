name: go-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/go-ci.yml"
      - ".github/actions/setup-go/**"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      # golangci-lint run checks linters and (via enabled formatters) formatting.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2 # keep in sync with mise.toml
      - run: go build ./...
      - run: go test ./...
