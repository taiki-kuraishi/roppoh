name: go-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".docker/discord-gateway-proxy/**"
      - ".github/workflows/go-ci.yml"
      - ".github/actions/setup-go/**"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go
      - parallel:
          - name: Lint (golangci-lint)
            run: golangci-lint run
          - name: Build
            run: go build ./...
          - name: Test
            run: go test ./...

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build discord-gateway-proxy image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/discord-gateway-proxy/Dockerfile
          push: false
          load: false
          tags: discord-gateway-proxy:ci
          cache-from: type=gha,scope=discord-gateway-proxy
          cache-to: type=gha,mode=max,scope=discord-gateway-proxy
