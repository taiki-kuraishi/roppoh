PermitRootLogin no
# Cloudflare Access(SSO)を前段のゲートとし、sshd 自体はパスワード認証を許可する。
# パスワードハッシュは SOPS 暗号化された dev-pod Secret(user-password-hash)を
# sshd コンテナ起動時に usermod -p で /etc/shadow へ適用する(statefulset 参照)。
PasswordAuthentication yes
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthorizedKeysFile /etc/ssh/authorized_keys/%u
HostKey /etc/ssh/keys/ssh_host_ed25519_key
AllowUsers user
# コンテナには pam_loginuid 等が必要とする権限が無いため PAM スタックを無効化する
UsePAM no
