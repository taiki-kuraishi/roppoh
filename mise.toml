[tools]
bun = "1.3.14"
# required at runtime by npm-installed tools such as turbo/dev3000, whose bin scripts shebang to node
node = "24"
# Keep this version in sync with the go directive in go.mod
go = "1.26.4"
golangci-lint = "2.12.2"
kube-linter = "0.8.3"
kubeconform = "0.8.0"
lefthook = "2.1.9"
terraform = "1.15.6"
tflint = "0.63.1"
"npm:turbo" = "2.9.9"
sops = "3.13.1"
age = "1.3.1"
"npm:dev3000" = "0.0.175"

[env]
SOPS_AGE_KEY_FILE = "{{env.HOME}}/.config/sops/age/keys.txt"
# Force colored output from tasks: mise's prefix output pipes each child's
# stdout, so tools would otherwise see a non-tty and disable color.
CLICOLOR_FORCE = "1"
FORCE_COLOR = "1"

[settings]
npm.bun = true
lockfile = true

[tasks.format]
run = "bun run oxfmt"
