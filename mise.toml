[tools]
bun = "1.3.14"
# Keep this version in sync with actions/setup-node@v6 in .github/workflows/bun-ci.yml
# (required at runtime by npm-installed tools such as oxfmt, whose bin scripts shebang to node)
node = "24"
# Keep this version in sync with .github/actions/setup-go and the go directive in go.mod
go = "1.26.4"
# Keep this version in sync with golangci/golangci-lint-action version in .github/workflows/go-ci.yml
golangci-lint = "2.12.2"
kube-linter = "0.8.3"
kubeconform = "0.8.0"
lefthook = "2.1.6"
terraform = "1.15.6"
tflint = "0.63.1"
"npm:turbo" = "2.9.9"
sops = "3.13.1"
age = "1.3.1"
"npm:dev3000" = "0.0.175"
"npm:oxfmt" = "0.56.0"

[env]
SOPS_AGE_KEY_FILE = "{{env.HOME}}/.config/sops/age/keys.txt"
# Force colored output from tasks: mise's prefix output pipes each child's
# stdout, so tools would otherwise see a non-tty and disable color.
CLICOLOR_FORCE = "1"
FORCE_COLOR = "1"

[settings]
npm.bun = true
lockfile = true

[tasks.format]
run = "oxfmt"
