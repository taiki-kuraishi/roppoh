version: "2"

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - revive
    - gocritic
    - misspell
    - bodyclose
    - errorlint
    - unconvert
    - unparam
    - nakedret
    - nilerr
    - nilnil
    - usestdlibvars
    - perfsprint
    - prealloc
    - wastedassign
    - durationcheck
    - errname
    - predeclared
    - reassign
    - bidichk
    - makezero
    - intrange
    - gosec
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - unparam
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tsar-org/roppoh
